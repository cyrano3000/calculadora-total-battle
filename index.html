<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K239 Calculator V52 - No Negatives</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; transition: 0.3s; }
        .contenedor { max-width: 900px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); position: relative; }
        
        .header-area { display: flex; justify-content: center; align-items: center; border-bottom: 2px solid #8b5a2b; margin-bottom: 15px; padding-bottom: 10px; position: relative; min-height: 50px; }
        h2 { color: #d4af37; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 1.5em; text-align: center; width: 100%; }
        
        .lang-container { position: absolute; right: 0; top: 0; z-index: 10; }
        .lang-select { background: #8b5a2b; color: white; border: 1px solid #d4af37; padding: 6px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; outline: none; font-size: 0.85em; }

        .alerta-multa { background: #4a0f0f; color: #ffcccc; border: 2px solid #ff4d4d; padding: 15px; text-align: center; font-weight: bold; border-radius: 8px; margin-bottom: 20px; text-transform: uppercase; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding: 8px 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); }
        
        .rtl { direction: rtl; }
        .rtl h3 { border-left: 0; border-right: 5px solid #8b5a2b; }
        .rtl .lang-container { right: auto; left: 0; direction: ltr; } 

        .fila-dinamica { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn-report { background: #d4af37; color: #1a110a; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 1.2em; text-transform: uppercase; transition: 0.3s; }
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .del-btn { color:red; background:none; border:none; cursor:pointer; font-weight:bold; font-size: 1.2em; padding: 0 10px; }
    </style>
</head>
<body onload="init()">

<div class="contenedor" id="main-container">
    <div class="header-area">
        <h2 id="txt-titulo">Calculadora K239</h2>
        <div class="lang-container">
            <select id="select-lang" class="lang-select" onchange="changeLang()">
                <option value="es">🇪🇸 ES</option>
                <option value="en">🇺🇸 EN</option>
                <option value="fr">🇫🇷 FR</option>
                <option value="de">🇩🇪 DE</option>
                <option value="ru">🇷🇺 RU</option>
                <option value="ar">🇦🇪 AR</option>
            </select>
        </div>
    </div>
    
    <div class="alerta-multa" id="txt-alerta">⚠️ Multa de Ataque: 5,000,000 Plata (Fija)</div>

    <h3 id="txt-sec1">1. Líderes</h3>
    <div id="lista-lideres"></div>
    <button class="btn-add" onclick="nuevoLider()" id="btn-add-lider">+ Añadir Líder</button>

    <h3 id="txt-sec2">2. Tropas de Cuartel</h3>
    <div id="lista-cuartel"></div>
    <button class="btn-add" onclick="nuevaFila('Cuartel')" id="btn-add-cuartel">+ Añadir Tropa de Cuartel</button>

    <h3 id="txt-sec3">3. Mercenarios Temporales</h3>
    <div id="lista-mercenarios"></div>
    <button class="btn-add" onclick="nuevaFila('Mercenario')" id="btn-add-merc">+ Añadir Mercenario Temporal</button>

    <h3 id="txt-sec4">4. Edificios y Otros</h3>
    <div id="lista-fortalezas"></div>
    <button class="btn-add" onclick="nuevaFortaleza()" id="btn-add-fort">+ Añadir Fortaleza (Máx 4)</button>
    
    <div class="grid-triple">
        <div class="caja-input"><label id="txt-wall">Muros</label><input type="number" id="wall-lvl" min="0" placeholder="Lvl" oninput="validarPositivo(this)"></div>
        <div class="caja-input"><label id="txt-cap">Capital (1-25)</label><input type="number" id="cap-lvl" min="0" max="25" placeholder="Nivel" oninput="validarCapital(this)"></div>
        <div class="caja-input"><label id="txt-portal">Portal</label><div style="margin-top:5px;"><input type="checkbox" id="check-portal" onchange="calcular()"><span id="txt-destruido"> Destruido</span></div></div>
    </div>

    <div class="total-box">
        <span id="total-final">0</span>
        <div style="margin-top:10px; margin-bottom: 20px;">
            <input type="radio" name="m" id="m-p" onchange="calcular()"> <label for="m-p" id="txt-plata">Plata</label>
            <input type="radio" name="m" id="m-o" checked onchange="calcular()"> <label for="m-o" id="txt-oro">Oro</label>
        </div>
        <button class="btn-report" onclick="generarInforme()" id="btn-report">📋 Copiar Informe Detallado @K239</button>
    </div>
</div>

    let currentLang = 'es';

    const translations = {

        ar: { titulo: "حاسبة K239", alerta: "⚠️ غرامة الهجوم: 5,000,000 فضة (ثابتة)", sec1: "1. القادة", sec2: "2. قوات الثكنات", sec3: "3. المرتزقة المؤقتون", sec4: "4. المباني وغيرها", addLider: "+ إضافة قائد", addCuartel: "+ إضافة قوات ثكنات", addMerc: "+ إضافة مرتزق", addFort: "+ إضافة حصن (بحد أقصى 4)", wall: "الأسوار", cap: "العاصمة (1-25)", portal: "البوابة", destruido: " مدمرة", plata: "فضة", oro: "ذهب", report: "📋 نسخ تقرير مفصل @K239", hero: "بطل", captain: "قائد", fortTxt: "حصن", alertCopy: "✅ تم نسخ التقرير المفصل.", baseFine: "الغرامة الأساسية", totalTxt: "المجموع النهائي" }
    };

    const dbPrecios = {
        "Cuartel": [
            { es: "Guardia Montada", en: "Mounted Guard", fr: "Garde Montée", de: "Berittene Wache", ru: "Всадник", ar: "حرس خيالة", p: 1250 },
            { es: "Guardia Voladora", en: "Flying Guard", fr: "Garde Volante", de: "Fliegende Wache", ru: "Летающий страж", ar: "حرس طائر", p: 12500 },
            { es: "Guardia C.C. / Distancia", en: "Melee / Ranged Guard", fr: "Garde Mêlée / Portée", de: "Nah / Fernkampf Wache", ru: "Ближний / Дальний бой", ar: "حرس مشاة / رماة", p: 625 },
            { es: "Espec. Montada", en: "Spec. Mounted", fr: "Spéc. Montée", de: "Spez. Berittene", ru: "Спец. Всадник", ar: "خيال خاص", p: 1400 },
            { es: "Espec. Voladora", en: "Spec. Flying", fr: "Spéc. Volante", de: "Spez. Fliegende", ru: "Спец. Летающий", ar: "طائر خاص", p: 28000 },
            { es: "Espec. C.C. / Distancia", en: "Spec. Melee / Ranged", fr: "Spéc. Mêlée / Portée", de: "Spez. Nah / Fern", ru: "Спец. Ближний/Дальний", ar: "مشاة/رماة خاص", p: 700 },
            { es: "Espec. Explorador", en: "Spec. Scout", fr: "Spéc. Éclaireur", de: "Spez. Späher", ru: "Спец. Разведчик", ar: "كشاف خاص", p: 3500 },
            { es: "Asedio", en: "Siege", fr: "Siège", de: "Belagerung", ru: "Осада", ar: "حصار", p: 6250 },
            { es: "Monstruo III", en: "Monster III", fr: "Monstre III", de: "Monster III", ru: "Монстр III", ar: "وحش III", p: 4000 },
            { es: "Monstruo IV", en: "Monster IV", fr: "Monstre IV", de: "Monster IV", ru: "Монстр IV", ar: "وحش IV", p: 8000 },
            { es: "Monstruo V", en: "Monster V", fr: "Monstre V", de: "Monster V", ru: "Монстр V", ar: "وحش V", p: 12000 },
            { es: "Monstruo VI", en: "Monster VI", fr: "Monstre VI", de: "Monster VI", ru: "Монстр VI", ar: "وحش VI", p: 18000 },
            { es: "Monstruo VII", en: "Monster VII", fr: "Monstre VII", de: "Monster VII", ru: "Монстр VII", ar: "وحش VII", p: 24000 },
            { es: "Monstruo I", en: "Monster I", fr: "Monstre I", de: "Monster I", ru: "Монстр I", ar: "وحش I", p: 29000 },
            { es: "Monstruo II", en: "Monster II", fr: "Monstre II", de: "Monster II", ru: "Монстр II", ar: "وحش II", p: 32000 }
        ],
        "Mercenario": [
            { es: "Merc. Montada", en: "Merc. Mounted", fr: "Merc. Monté", de: "Söldn. Beritten", ru: "Наем. Всадник", ar: "مرتزق خيال", p: 2500 },
            { es: "Merc. Voladora", en: "Merc. Flying", fr: "Merc. Volant", de: "Söldn. Fliegend", ru: "Наем. Летающий", ar: "مرتزق طائر", p: 25000 },
            { es: "Merc. C.C. / Distancia", en: "Merc. Melee / Ranged", fr: "Merc. Mêlée / Portée", de: "Söldn. Nah / Fern", ru: "Наем. Ближний/Дальний", ar: "مرتزق مشاة/رماة", p: 1250 },
            { es: "M. Espec. Montada", en: "M. Spec. Mounted", fr: "M. Spéc. Montée", de: "M. Spez. Beritten", ru: "Наем. Спец. Всадник", ar: "مرتزق خيال خاص", p: 2800 },
            { es: "M. Espec. Voladora", en: "M. Spec. Flying", fr: "M. Spéc. Volante", de: "M. Spez. Fliegend", ru: "Наем. Спец. Летающий", ar: "مرتزق طائر خاص", p: 28000 },
            { es: "M. Espec. C.C. / Distancia", en: "M. Spec. Melee / Ranged", fr: "M. Spéc. Mêlée / Portée", de: "M. Spez. Nah / Fern", ru: "Наем. Спец. Ближний/Дальний", ar: "مرتزق مشاة خاص", p: 1400 },
            { es: "M. Espec. Explorador", en: "M. Spec. Scout", fr: "M. Spéc. Éclaireur", de: "M. Spez. Späher", ru: "Наем. Спец. Разведчик", ar: "مرتزق كشاف خاص", p: 7000 },
            { es: "Merc. Asedio", en: "Merc. Siege", fr: "Merc. Siège", de: "Söldn. Belagerung", ru: "Наем. Осада", ar: "مرتزق حصار", p: 12500 },
            { es: "Monst. Montada", en: "Monst. Mounted", fr: "Monst. Monté", de: "Monst. Beritten", ru: "Монстр. Всадник", ar: "وحش خيال", p: 5300 },
            { es: "Monst. Voladora", en: "Monst. Flying", fr: "Monst. Volant", de: "Monst. Fliegend", ru: "Монстр. Летающий", ar: "وحش طائر", p: 7600 },
            { es: "Monst. C.C. / Distancia", en: "Monst. Melee / Ranged", fr: "Monst. Mêlée / Portée", de: "Monst. Nah / Fern", ru: "Монстр. Ближний/Дальний", ar: "وحش مشاة/رماة", p: 5000 }
        ]
    };

    function validarPositivo(input) {
        if (input.value < 0) input.value = 0;
        calcular();
    }

    function validarCapital(input) {
        if (input.value < 0) input.value = 0;
        if (input.value > 25) input.value = 25;
        calcular();
    }

    function changeLang() {
        currentLang = document.getElementById('select-lang').value;
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        const container = document.getElementById('main-container');
        if(currentLang === 'ar') container.classList.add('rtl');
        else container.classList.remove('rtl');

        document.getElementById('txt-titulo').innerText = t.titulo;
        document.getElementById('txt-alerta').innerText = t.alerta;
        document.getElementById('txt-sec1').innerText = t.sec1;
        document.getElementById('txt-sec2').innerText = t.sec2;
        document.getElementById('txt-sec3').innerText = t.sec3;
        document.getElementById('txt-sec4').innerText = t.sec4;
        document.getElementById('btn-add-lider').innerText = t.addLider;
        document.getElementById('btn-add-cuartel').innerText = t.addCuartel;
        document.getElementById('btn-add-merc').innerText = t.addMerc;
        document.getElementById('btn-add-fort').innerText = t.addFort;
        document.getElementById('txt-wall').innerText = t.wall;
        document.getElementById('txt-cap').innerText = t.cap;
        document.getElementById('txt-portal').innerText = t.portal;
        document.getElementById('txt-destruido').innerText = t.destruido;
        document.getElementById('txt-plata').innerText = t.plata;
        document.getElementById('txt-oro').innerText = t.oro;
        document.getElementById('btn-report').innerText = t.report;

        document.querySelectorAll('.l-type').forEach(s => {
            const val = s.value;
            s.innerHTML = `<option value="Héroe" ${val==='Héroe'?'selected':''}>${t.hero}</option>
                           <option value="Capitán" ${val==='Capitán'?'selected':''}>${t.captain}</option>`;
        });

        document.querySelectorAll('.t-tipo').forEach(s => {
            const val = s.value;
            const cat = s.getAttribute('data-cat');
            let opts = "";
            dbPrecios[cat].forEach(item => {
                opts += `<option value="${item.p}" ${val==item.p?'selected':''}>${item[currentLang]} (${item.p.toLocaleString()})</option>`;
            });
            s.innerHTML = opts;
        });

        document.querySelectorAll('.fort-label').forEach(span => span.innerText = t.fortTxt);
    }

    function init() { updateUI(); }

    function nuevoLider() {
        if (document.querySelectorAll('.l-type').length >= 4) return;
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        const t = translations[currentLang];
        div.innerHTML = `<select class="l-type" onchange="calcular()"><option value="Héroe">${t.hero}</option><option value="Capitán">${t.captain}</option></select>
            <input type="number" class="l-lvl" placeholder="Lvl" value="1" min="0" oninput="validarPositivo(this)">
            <button onclick="this.parentElement.remove(); calcular();" class="del-btn">✖</button>`;
        document.getElementById('lista-lideres').appendChild(div);
        calcular();
    }

    function nuevaFila(tipo) {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        let options = "";
        dbPrecios[tipo].forEach(item => {
            options += `<option value="${item.p}">${item[currentLang]} (${item.p.toLocaleString()})</option>`;
        });
        div.innerHTML = `<select class="t-tipo" data-cat="${tipo}" onchange="calcular()">${options}</select>
            <input type="number" class="t-qty" placeholder="Cant" min="0" oninput="validarPositivo(this)">
            <button onclick="this.parentElement.remove(); calcular();" class="del-btn">✖</button>`;
        document.getElementById(tipo === 'Cuartel' ? 'lista-cuartel' : 'lista-mercenarios').appendChild(div);
    }

    function nuevaFortaleza() {
        if (document.querySelectorAll('.fort-lvl').length >= 4) return;
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<span class="fort-label" style="flex-grow:1">${translations[currentLang].fortTxt}</span><input type="number" class="fort-lvl" placeholder="Lvl" style="width:100px" min="0" max="25" oninput="validarCapital(this)">
            <button onclick="this.parentElement.remove(); calcular();" class="del-btn">✖</button>`;
        document.getElementById('lista-fortalezas').appendChild(div);
    }

    function calcular() {
        let p = 5000000;
        document.querySelectorAll('.l-lvl').forEach(i => p += (Math.max(0, parseInt(i.value))||0)*3000);
        document.querySelectorAll('.t-qty').forEach(q => {
            const v = q.parentElement.querySelector('.t-tipo').value;
            p += (Math.max(0, parseInt(q.value))||0) * parseInt(v);
        });
        document.querySelectorAll('.fort-lvl').forEach(i => p += (Math.max(0, parseInt(i.value))||0)*50000000);
        p += (Math.max(0, parseInt(document.getElementById('wall-lvl').value))||0)*1000000;
        const cv = Math.max(0, parseInt(document.getElementById('cap-lvl').value))||0;
        if(cv > 0) p += cv * 450000000;
        if(document.getElementById('check-portal').checked) p += 5000000;
        
        const isO = document.getElementById('m-o').checked;
        document.getElementById('total-final').innerText = Math.round(isO ? p/3000 : p).toLocaleString();
    }

    function generarInforme() {
        const isOro = document.getElementById('m-o').checked;
        const f = isOro ? 3000 : 1;
        const mon = isOro ? translations[currentLang].oro : translations[currentLang].plata;
        const t = translations[currentLang];
        let inf = `📊 **${t.titulo}**\n━━━━━━━━━━━━━━━━━━━━━\n`;
        inf += `✅ ${t.baseFine}: ${(5000000/f).toLocaleString()} ${mon}\n`;
        document.querySelectorAll('#lista-lideres .fila-dinamica').forEach(l => {
            const type = l.querySelector('.l-type').value;
            const lvl = Math.max(0, l.querySelector('.l-lvl').value || 0);
            const typeTxt = type === 'Héroe' ? t.hero : t.captain;
            inf += `👤 ${typeTxt} (Lvl ${lvl}): ${((lvl*3000)/f).toLocaleString()} ${mon}\n`;
        });
        document.querySelectorAll('.t-qty').forEach(q => {
            const qty = Math.max(0, q.value || 0);
            const sel = q.parentElement.querySelector('.t-tipo');
            const cat = sel.getAttribute('data-cat');
            const name = sel.options[sel.selectedIndex].text.split(' (')[0];
            const price = parseInt(sel.value);
            if(qty > 0) inf += `⚔️ [${cat}] ${name} x${parseInt(qty).toLocaleString()}: ${((qty*price)/f).toLocaleString()} ${mon}\n`;
        });
        document.querySelectorAll('.fort-lvl').forEach((fort, index) => {
            const lvl = Math.max(0, fort.value || 0);
            if(lvl > 0) inf += `🛡️ ${t.fortTxt} ${index+1} (Lvl ${lvl}): ${((lvl*50000000)/f).toLocaleString()} ${mon}\n`;
        });
        const wall = Math.max(0, parseInt(document.getElementById('wall-lvl').value)||0);
        if(wall > 0) inf += `🧱 ${t.wall} (Lvl ${wall}): ${((wall*1000000)/f).toLocaleString()} ${mon}\n`;
        const cap = Math.max(0, parseInt(document.getElementById('cap-lvl').value)||0);
        if(cap > 0) inf += `🏰 Capital (Lvl ${cap}): ${((cap*450000000)/f).toLocaleString()} ${mon}\n`;
        if(document.getElementById('check-portal').checked) inf += `🌀 ${t.portal}${t.destruido}: ${(5000000/f).toLocaleString()} ${mon}\n`;
        inf += `━━━━━━━━━━━━━━━━━━━━━\n💰 **${t.totalTxt}: ${document.getElementById('total-final').innerText} ${mon}**\n━━━━━━━━━━━━━━━━━━━━━\n@K239`;
        navigator.clipboard.writeText(inf).then(() => alert(t.alertCopy));
    }
</script>
</body>
</html>
