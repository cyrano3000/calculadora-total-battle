<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FobS Compensation Calculator - Custom Order</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 850px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 8px; }
        
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 10px; margin-bottom: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        .caja-input label { display: block; color: #d4af37; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        .fila-check { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #3d2b1f; margin-bottom: 8px; }
        .check-oculto { display: none; }
        .boton-check { width: 24px; height: 24px; border: 2px solid #d4af37; border-radius: 4px; cursor: pointer; background: #1a110a; position: relative; flex-shrink: 0; }
        .check-oculto:checked + .boton-check { background: #4a7c44; border-color: #76b06d; }
        .check-oculto:checked + .boton-check::after { content: '✔'; color: white; position: absolute; left: 4px; top: -2px; font-size: 18px; }
        
        .nivel-lider { display: none; width: 80px; text-align: center; }
        .fila-tropa { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .btn-calc { background: #8b5a2b; color: white; border: none; padding: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }
        .btn-calc:hover { background: #a67341; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        small.limit-info { color: #8b5a2b; font-size: 0.75em; display: block; margin-top: 2px; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>### Attack Compensation Calculator ###</h2>

    <h3>1. Leaders Status (Section 3)</h3>
    <div id="seccion-lideres">
        <div class="fila-check">
            <input type="checkbox" id="c-h" class="check-oculto" onclick="document.getElementById('n-h').style.display = this.checked ? 'block' : 'none'">
            <label for="c-h" class="boton-check"></label><label style="flex-grow:1; cursor:pointer;">Hero (3k silver/lvl)</label>
            <input type="number" id="n-h" class="nivel-lider" placeholder="Lvl">
        </div>
        <div class="fila-check">
            <input type="checkbox" id="c-c1" class="check-oculto" onclick="document.getElementById('n-c1').style.display = this.checked ? 'block' : 'none'">
            <label for="c-c1" class="boton-check"></label><label style="flex-grow:1; cursor:pointer;">Captain 1</label>
            <input type="number" id="n-c1" class="nivel-lider" placeholder="Lvl">
        </div>
        <div class="fila-check">
            <input type="checkbox" id="c-c2" class="check-oculto" onclick="document.getElementById('n-c2').style.display = this.checked ? 'block' : 'none'">
            <label for="c-c2" class="boton-check"></label><label style="flex-grow:1; cursor:pointer;">Captain 2</label>
            <input type="number" id="n-c2" class="nivel-lider" placeholder="Lvl">
        </div>
        <div class="fila-check">
            <input type="checkbox" id="c-c3" class="check-oculto" onclick="document.getElementById('n-c3').style.display = this.checked ? 'block' : 'none'">
            <label for="c-c3" class="boton-check"></label><label style="flex-grow:1; cursor:pointer;">Captain 3</label>
            <input type="number" id="n-c3" class="nivel-lider" placeholder="Lvl">
        </div>
    </div>

    <h3>2. Unit Losses (Section 4)</h3>
    <div id="lista-tropas"></div>
    <button class="btn-add" onclick="nuevaFila()">+ Add Unit Type</button>

    <h3>3. Stolen Resources (Section 1)</h3>
    <div class="grid-triple">
        <div class="caja-input">
            <label>Silver Stolen</label>
            <input type="number" id="rob-silver" placeholder="0">
        </div>
        <div class="caja-input">
            <label>Gold Stolen</label>
            <input type="number" id="rob-gold" placeholder="0">
        </div>
        <div class="caja-input">
            <label>TAR (Oil) Stolen</label>
            <input type="number" id="rob-tar" placeholder="0">
        </div>
    </div>

    <h3>4. Clan Buildings & Portal (Section 2)</h3>
    <div class="fila-check">
        <input type="checkbox" id="check-portal" class="check-oculto">
        <label for="check-portal" class="boton-check"></label>
        <label for="check-portal" style="flex-grow:1; cursor:pointer; font-weight:bold;">Portal Destroyed (+5,000,000 Silver)</label>
    </div>
    
    <div class="grid-triple">
        <div class="caja-input">
            <label>City Walls Lvl</label>
            <input type="number" id="wall-lvl" placeholder="1-45" min="0" max="45">
            <small class="limit-info">Limit: 45</small>
        </div>
        <div class="caja-input" style="border: 1px solid #d4af37;">
            <label>Fortress Lvl</label>
            <input type="number" id="fort-lvl" placeholder="1-25" min="0" max="25">
            <small class="limit-info">Limit: 25</small>
        </div>
        <div class="caja-input" style="border: 1px solid #d4af37;">
            <label>Capital Lvl</label>
            <input type="number" id="cap-lvl" placeholder="1-25" min="0" max="25">
            <small class="limit-info">Limit: 25</small>
        </div>
    </div>

    <div class="total-box">
        <p>Display as: 
            <input type="radio" name="m" value="p" id="m-p"> <label for="m-p" style="cursor:pointer">Silver</label>
            <input type="radio" name="m" value="o" id="m-o" checked style="margin-left:15px;"> <label for="m-o" style="cursor:pointer">Gold</label>
        </p>
        <button class="btn-calc" onclick="calcular()">Calculate Compensation</button>
        <span id="total-final">0</span>
        <small id="txt-moneda">gold coins</small>
    </div>
</div>

<script>
    const DB = {
        "Guards": { "Mounted": 1265, "Flying": 12640, "Melee/Ranged": 630 },
        "Specialists": { "Mounted": 1390, "Flying/Melee/Ranged": 695, "Scouts": 6320 },
        "Siege": { "Default Units": 3475 },
        "Monsters": { "Tier III": 4000, "Tier IV": 8000, "Tier V": 12000, "Tier VI": 18000, "Tier VII": 24000, "Tier I": 29000, "Tier II": 32000 },
        "Temp Mercs": { 
            "G-Mounted": 2530, "G-Flying": 25300, "G-Melee/Ranged": 1265,
            "S-Mounted": 2780, "S-Flying": 27800, "S-Melee/Ranged": 1390, "S-Scouts": 6950,
            "Siege": 12650, "Monster: Mounted": 5300, "Monster: Flying": 7585, "Monster: Melee/Ranged": 5000 
        }
    };

    function nuevaFila() {
        const div = document.createElement('div');
        div.className = 'fila-tropa';
        let opt = Object.keys(DB).map(c => `<option value="${c}">${c}</option>`).join('');
        div.innerHTML = `<select onchange="updateSub(this)"><option value="">Category</option>${opt}</select>
            <select class="sub-t" style="display:none"></select>
            <input type="number" class="qty" placeholder="Qty">
            <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">✖</button>`;
        document.getElementById('lista-tropas').appendChild(div);
    }

    function updateSub(sel) {
        const sub = sel.parentElement.querySelector('.sub-t');
        if(sel.value) {
            sub.innerHTML = Object.entries(DB[sel.value]).map(([n,v])=>`<option value="${v}">${n} (${v})</option>`).join('');
            sub.style.display = "block";
        }
    }

    function validar(id, max) {
        let val = parseInt(document.getElementById(id).value) || 0;
        if (val > max) {
            document.getElementById(id).value = max;
            return max;
        }
        return val;
    }

    function calcular() {
        let silver = 0;
        
        // Lideres (Sec 3)
        ['n-h','n-c1','n-c2','n-c3'].forEach(id => {
            let el = document.getElementById(id);
            if(el && el.style.display === 'block') silver += (parseInt(el.value) || 0) * 3000;
        });

        // Tropas (Sec 4)
        document.querySelectorAll('.fila-tropa').forEach(f => {
            silver += (parseInt(f.querySelector('.qty').value) || 0) * (parseInt(f.querySelector('.sub-t').value) || 0);
        });

        // Robo (Sec 1)
        silver += (parseInt(document.getElementById('rob-silver').value) || 0);
        silver += (parseInt(document.getElementById('rob-gold').value) || 0) * 3000;
        silver += (parseInt(document.getElementById('rob-tar').value) || 0) * 4500;
        
        // Clan (Sec 2)
        if(document.getElementById('check-portal').checked) silver += 5000000;
        silver += validar('wall-lvl', 45) * 1000000;
        silver += validar('fort-lvl', 25) * 50000000;
        silver += validar('cap-lvl', 25) * 450000000;

        const isGold = document.getElementById('m-o').checked;
        document.getElementById('total-final').innerText = Math.round(isGold ? silver/3000 : silver).toLocaleString();
        document.getElementById('txt-moneda').innerText = isGold ? "gold coins" : "silver";
    }
</script>
</body>
</html>
