<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FobS Compensation Calculator - Official</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; }
        .contenedor { max-width: 850px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 30px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding-top: 8px; padding-bottom: 8px; }

        /* Sección de Recursos Robados */
        .grid-recursos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; }
        .caja-recurso { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .caja-recurso label { display: block; color: #d4af37; font-weight: bold; font-size: 0.85em; margin-bottom: 8px; }

        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 1em; }
        
        /* Líderes */
        .lider-fila { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #3d2b1f; }
        .check-oculto { display: none; }
        .boton-check { width: 26px; height: 26px; border: 2px solid #d4af37; border-radius: 4px; cursor: pointer; background: #1a110a; position: relative; flex-shrink: 0; }
        .check-oculto:checked + .boton-check { background: #4a7c44; border-color: #76b06d; }
        .check-oculto:checked + .boton-check::after { content: '✔'; color: white; position: absolute; left: 5px; top: -2px; font-size: 20px; }
        .nivel-input { display: none; width: 110px; text-align: center; border: 1px solid #d4af37; }

        /* Tropas */
        .fila-tropa { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; transition: 0.3s; }
        .btn-add:hover { background: #5ba354; }
        
        /* Resultados */
        .total-box { margin-top: 35px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .btn-calc { background: #8b5a2b; color: white; border: none; padding: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.3em; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-calc:hover { background: #a67341; transform: translateY(-2px); }
        .radio-group { margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>### Attack Compensation Calculator ###</h2>

    <h3>1. Stolen Resources & Walls</h3>
    <div class="grid-recursos">
        <div class="caja-recurso">
            <label>Silver Stolen</label>
            <input type="number" id="rob-silver" placeholder="0" min="0">
        </div>
        <div class="caja-recurso">
            <label>Gold Stolen</label>
            <input type="number" id="rob-gold" placeholder="0" min="0">
        </div>
        <div class="caja-recurso">
            <label>TAR (Oil) Stolen</label>
            <input type="number" id="rob-tar" placeholder="0" min="0">
        </div>
    </div>
    <div style="margin-top: 15px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid #3d2b1f;">
        <label style="display: block; color: #d4af37; font-weight: bold; font-size: 0.85em; margin-bottom: 8px;">City Walls Level (1M per level)</label>
        <input type="number" id="wall-lvl" placeholder="Levels destroyed" min="0">
    </div>

    <h3>2. Leaders Status</h3>
    <div id="seccion-lideres">
        <div class="lider-fila">
            <input type="checkbox" id="c-h" class="check-oculto" onclick="document.getElementById('n-h').style.display = this.checked ? 'block' : 'none'">
            <label for="c-h" class="boton-check"></label>
            <label for="c-h" style="flex-grow:1; cursor:pointer;">Hero (3000 silver/lvl)</label>
            <input type="number" id="n-h" class="nivel-input" placeholder="Lvl">
        </div>
        <div class="lider-fila">
            <input type="checkbox" id="c-c1" class="check-oculto" onclick="document.getElementById('n-c1').style.display = this.checked ? 'block' : 'none'">
            <label for="c-c1" class="boton-check"></label>
            <label for="c-c1" style="flex-grow:1; cursor:pointer;">Captain 1</label>
            <input type="number" id="n-c1" class="nivel-input" placeholder="Lvl">
        </div>
        <div class="lider-fila">
            <input type="checkbox" id="c-c2" class="check-oculto" onclick="document.getElementById('n-c2').style.display = this.checked ? 'block' : 'none'">
            <label for="c-c2" class="boton-check"></label>
            <label for="c-c2" style="flex-grow:1; cursor:pointer;">Captain 2</label>
            <input type="number" id="n-c2" class="nivel-input" placeholder="Lvl">
        </div>
        <div class="lider-fila">
            <input type="checkbox" id="c-c3" class="check-oculto" onclick="document.getElementById('n-c3').style.display = this.checked ? 'block' : 'none'">
            <label for="c-c3" class="boton-check"></label>
            <label for="c-c3" style="flex-grow:1; cursor:pointer;">Captain 3</label>
            <input type="number" id="n-c3" class="nivel-input" placeholder="Lvl">
        </div>
    </div>

    <h3>3. Unit Losses</h3>
    <div id="lista-tropas"></div>
    <button class="btn-add" onclick="nuevaFila()">+ Add Unit Type</button>

    <div class="total-box">
        <div class="radio-group">
            Display total as: 
            <input type="radio" name="m" value="p" id="m-p"> <label for="m-p" style="cursor:pointer">Silver</label>
            <input type="radio" name="m" value="o" id="m-o" checked style="margin-left:15px;"> <label for="m-o" style="cursor:pointer">Gold</label>
        </div>
        <button class="btn-calc" onclick="calcular()">Calculate Final Compensation</button>
        <span id="total-final">0</span>
        <small id="txt-moneda" style="color: #d4af37; text-transform: uppercase; font-weight: bold;">gold coins</small>
    </div>
</div>

<script>
    // BASE DE DATOS ACTUALIZADA SEGÚN IMÁGENES
    const DB = {
        "Guards": { "Mounted": 1250, "Flying": 12500, "Melee/Ranged": 625 },
        "Specialists": { "Mounted": 1400, "Flying/Melee/Ranged": 700, "Scouts": 3500 },
        "Siege": { "Default": 6250 },
        "Monsters": { "T-III": 4000, "T-IV": 8000, "T-V": 12000, "T-VI": 18000, "T-VII": 24000, "T-I": 29000, "T-II": 32000 },
        "Temp Mercenaries": { 
            "G-Mounted": 2500, "G-Flying": 25000, "G-Melee/Ranged": 1250,
            "S-Mounted": 2800, "S-Flying": 28000, "S-Melee/Ranged": 1400, "S-Scouts": 7000,
            "Siege": 12500, "Monster: Mounted": 5300, "Monster: Flying": 7600, "Monster: Melee/Ranged": 5000 
        }
    };

    function nuevaFila() {
        const container = document.getElementById('lista-tropas');
        const div = document.createElement('div');
        div.className = 'fila-tropa';
        let cats = Object.keys(DB).map(c => `<option value="${c}">${c}</option>`).join('');
        
        div.innerHTML = `
            <select onchange="updateSub(this)"><option value="">Category</option>${cats}</select>
            <select class="sub-t" style="display:none"></select>
            <input type="number" class="qty" placeholder="Qty" min="0">
            <button onclick="this.parentElement.remove()" style="color:#ff4444; background:none; border:none; cursor:pointer; font-size:1.2em;">✖</button>
        `;
        container.appendChild(div);
    }

    function updateSub(sel) {
        const sub = sel.parentElement.querySelector('.sub-t');
        if(sel.value) {
            sub.innerHTML = Object.entries(DB[sel.value]).map(([n,v])=>`<option value="${v}">${n} (${v.toLocaleString()})</option>`).join('');
            sub.style.display = "block";
        } else {
            sub.style.display = "none";
        }
    }

    function calcular() {
        let silverTotal = 5000000; // Portal base fijo de 5M

        // 1. RECURSOS ROBADOS (Lógica: 1 Oro = 3000 Plata / 1 TAR = 4500 Plata)
        silverTotal += (parseInt(document.getElementById('rob-silver').value) || 0);
        silverTotal += (parseInt(document.getElementById('rob-gold').value) || 0) * 3000;
        silverTotal += (parseInt(document.getElementById('rob-tar').value) || 0) * 4500;
        
        // 2. MUROS (1M por nivel)
        silverTotal += (parseInt(document.getElementById('wall-lvl').value) || 0) * 1000000;

        // 3. LÍDERES (3000 por nivel si están seleccionados)
        ['n-h', 'n-c1', 'n-c2', 'n-c3'].forEach(id => {
            let el = document.getElementById(id);
            if(el.style.display === 'block') {
                silverTotal += (parseInt(el.value) || 0) * 3000;
            }
        });

        // 4. TROPAS
        document.querySelectorAll('.fila-tropa').forEach(f => {
            let cant = parseInt(f.querySelector('.qty').value) || 0;
            let val = parseInt(f.querySelector('.sub-t').value) || 0;
            silverTotal += (cant * val);
        });

        const isGold = document.getElementById('m-o').checked;
        const resultText = document.getElementById('total-final');
        const unitText = document.getElementById('txt-moneda');

        if (isGold) {
            resultText.innerText = Math.round(silverTotal / 3000).toLocaleString();
            unitText.innerText = "gold coins";
        } else {
            resultText.innerText = silverTotal.toLocaleString();
            unitText.innerText = "silver";
        }
    }
</script>

</body>
</html>
