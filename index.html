<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K239 Calculator V27 - Cuartel & Mercenarios</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 900px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        .lang-selector { text-align: right; margin-bottom: 20px; }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 8px; }
        .fila-dinamica { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn-add:hover { background: #5da356; }
        .btn-add:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        .caja-input label { display: block; color: #d4af37; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .del-btn { color:red; background:none; border:none; cursor:pointer; font-weight:bold; font-size:1.2em; padding: 0 10px; }
    </style>
</head>
<body onload="actualizarInterfaz()">

<div class="contenedor">
    <div class="lang-selector">
        <select id="select-idioma" onchange="actualizarInterfaz()">
            <option value="es" selected>Español 🇪🇸</option>
            <option value="en">English 🇬🇧</option>
        </select>
    </div>

    <h2 id="txt-titulo">Calculadora K239</h2>

    <h3 id="txt-sec1">1. Líderes (Máx 4 total)</h3>
    <div id="lista-lideres"></div>
    <button class="btn-add" id="btn-lider" onclick="nuevoLider()">+ Añadir Líder</button>

    <h3 id="txt-sec2">2. Tropas de Cuartel (Fijas)</h3>
    <div id="lista-cuartel"></div>
    <button class="btn-add" onclick="nuevaFila('cuartel')">+ Añadir Tropa de Cuartel</button>

    <h3 id="txt-sec3">3. Mercenarios Temporales</h3>
    <div id="lista-mercenarios"></div>
    <button class="btn-add" onclick="nuevaFila('mercenarios')">+ Añadir Mercenario</button>

    <h3 id="txt-sec4">4. Edificios y Otros</h3>
    <div class="grid-triple">
        <div class="caja-input"><label id="lbl-wall">Muros</label><input type="number" id="wall-lvl" placeholder="Lvl" oninput="calcular()"></div>
        <div class="caja-input"><label id="lbl-fort">Fortaleza</label><input type="number" id="fort-lvl" placeholder="Lvl" oninput="calcular()"></div>
        <div class="caja-input"><label id="lbl-cap">Capital</label><input type="number" id="cap-lvl" placeholder="Lvl" oninput="calcular()"></div>
    </div>
    <div style="margin-top:15px;"><input type="checkbox" id="check-portal" onchange="calcular()"><label id="lbl-portal" for="check-portal"> Portal Destruido (+5M)</label></div>

    <div class="total-box">
        <span id="total-final">0</span>
        <div style="margin-top:10px;">
            <input type="radio" name="m" id="m-p" onchange="calcular()"> <label for="m-p">Plata</label>
            <input type="radio" name="m" id="m-o" checked onchange="calcular()"> <label for="m-o">Oro</label>
        </div>
    </div>
</div>

<script>
    const i18n = {
        es: {
            tit: "Calculadora de Compensación K239", s1: "1. Líderes (Máx 4 total)", s2: "2. Tropas de Cuartel", s3: "3. Mercenarios Temporales",
            Mounted: "Montadas", Volador: "Voladora", Melee: "Cuerpo a cuerpo / Distancia", Scouts: "Exploradores", Siege: "Asedio",
            Guards: "Guardias", Specialists: "Especialistas", Monsters: "Monstruos", qty: "Cant"
        },
        en: {
            tit: "K239 Compensation Calculator", s1: "1. Leaders (Max 4)", s2: "2. Barracks Troops", s3: "3. Temporary Mercenaries",
            Mounted: "Mounted", Volador: "Flying", Melee: "Melee / Ranged", Scouts: "Scouts", Siege: "Siege",
            Guards: "Guards", Specialists: "Specialists", Monsters: "Monsters", qty: "Qty"
        }
    };

    // VALORES CUARTEL
    const dbCuartel = {
        "Guards": { "Mounted": 1250, "Volador": 12500, "Melee": 625 },
        "Specialists": { "Mounted": 1400, "Melee": 700, "Scouts": 3500 },
        "Siege": { "Siege": 6250 },
        "Monsters": { "I": 29000, "II": 32000, "III": 4000, "IV": 8000, "V": 12000, "VI": 18000, "VII": 24000 }
    };

    // VALORES MERCENARIOS
    const dbMercenarios = {
        "Guards": { "Mounted": 2500, "Volador": 25000, "Melee": 1250 },
        "Specialists": { "Mounted": 2800, "Volador": 28000, "Melee": 1400, "Scouts": 7000 },
        "Siege": { "Siege": 12500 },
        "Monsters": { "Mounted": 5300, "Volador": 7600, "Melee": 5000 }
    };

    function actualizarInterfaz() {
        const lang = document.getElementById('select-idioma').value;
        document.getElementById('txt-titulo').innerText = i18n[lang].tit;
        calcular();
    }

    function nuevaFila(tipo) {
        const lang = document.getElementById('select-idioma').value;
        const db = tipo === 'cuartel' ? dbCuartel : dbMercenarios;
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `
            <select class="cat-sel" onchange="updateSub(this, '${tipo}')">
                <option value="">Cat</option>
                <option value="Guards">${i18n[lang].Guards}</option>
                <option value="Specialists">${i18n[lang].Specialists}</option>
                <option value="Siege">${i18n[lang].Siege}</option>
                <option value="Monsters">${i18n[lang].Monsters}</option>
            </select>
            <select class="sub-sel" style="display:none" onchange="calcular()"></select>
            <input type="number" class="qty" placeholder="Cant" oninput="calcular()">
            <button onclick="this.parentElement.remove(); calcular();" class="del-btn">✖</button>`;
        document.getElementById('lista-' + tipo).appendChild(div);
    }

    function updateSub(sel, tipo) {
        const db = tipo === 'cuartel' ? dbCuartel : dbMercenarios;
        const lang = document.getElementById('select-idioma').value;
        const sub = sel.parentElement.querySelector('.sub-sel');
        const cat = sel.value;
        if(cat) {
            sub.innerHTML = Object.entries(db[cat]).map(([k, v]) => `<option value="${v}">${i18n[lang][k] || k} (${v})</option>`).join('');
            sub.style.display = 'block';
        } else { sub.style.display = 'none'; }
        calcular();
    }

    function nuevoLider() {
        if (document.getElementById('lista-lideres').children.length >= 4) return;
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select class="l-type" onchange="vL(this)"><option value="h">Héroe</option><option value="c">Capitán</option></select>
        <input type="number" class="l-lvl" value="1" oninput="calcular()"><button onclick="this.parentElement.remove(); checkL();" class="del-btn">✖</button>`;
        document.getElementById('lista-lideres').appendChild(div);
        vL(div.querySelector('select'));
    }

    function vL(s) {
        let h = 0, c = 0;
        document.querySelectorAll('.l-type').forEach(sel => { if(sel.value==='h') h++; else c++; });
        if(h > 1) s.value = 'c'; else if(c > 3) s.value = 'h';
        checkL();
    }

    function checkL() {
        document.getElementById('btn-lider').disabled = (document.querySelectorAll('.l-type').length >= 4);
        calcular();
    }

    function calcular() {
        let p = 5000000; // Base inicial
        document.querySelectorAll('.l-lvl').forEach(i => p += (parseInt(i.value)||0)*3000);
        document.querySelectorAll('.qty').forEach(i => {
            const val = i.parentElement.querySelector('.sub-sel').value;
            p += (parseInt(i.value)||0) * (parseInt(val)||0);
        });
        p += (parseInt(document.getElementById('wall-lvl').value)||0)*1000000;
        p += (parseInt(document.getElementById('fort-lvl').value)||0)*50000000;
        p += (parseInt(document.getElementById('cap-lvl').value)||0)*450000000;
        if(document.getElementById('check-portal').checked) p += 5000000;

        const isO = document.getElementById('m-o').checked;
        document.getElementById('total-final').innerText = Math.round(isO ? p/3000 : p).toLocaleString();
    }
</script>
</body>
</html>
