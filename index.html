<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FobS Compensation Calculator - V3</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 850px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 8px; }
        
        /* Estilo para las cajas de robo */
        .grid-robo { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 15px; }
        .caja-robo { background: #120c08; padding: 15px; border: 1px solid #d4af37; border-radius: 8px; }
        .caja-robo label { display: block; color: #d4af37; margin-bottom: 8px; font-weight: bold; font-size: 0.9em; }
        
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 1em; }
        .lider-fila { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #3d2b1f; }
        .check-oculto { display: none; }
        .boton-check { width: 26px; height: 26px; border: 2px solid #d4af37; border-radius: 4px; display: inline-block; cursor: pointer; background: #1a110a; position: relative; flex-shrink: 0; }
        .check-oculto:checked + .boton-check { background: #4a7c44; border-color: #76b06d; }
        .check-oculto:checked + .boton-check::after { content: '✔'; color: white; position: absolute; left: 5px; top: -2px; font-size: 20px; }
        .nivel-input { display: none; width: 100px; text-align: center; border: 1px solid #d4af37; }
        
        .fila { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        .total-box { margin-top: 35px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; margin: 10px 0; }
        .btn-calc { background: #8b5a2b; color: white; border: none; padding: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.3em; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-calc:hover { background: #a67341; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>### Registered Attack Report ###</h2>

    <div class="seccion">
        <h3>*STOLEN RESOURCES*</h3>
        <div class="grid-robo">
            <div class="caja-robo">
                <label>Silver Stolen</label>
                <input type="number" id="stolen-silver" placeholder="0" min="0">
            </div>
            <div class="caja-robo">
                <label>Gold Stolen</label>
                <input type="number" id="stolen-gold" placeholder="0" min="0">
            </div>
            <div class="caja-robo">
                <label>TAR (Oil) Stolen</label>
                <input type="number" id="stolen-tar" placeholder="0" min="0">
            </div>
        </div>
    </div>

    <div class="seccion">
        <h3>*LEADERS STATUS*</h3>
        <div class="lider-fila">
            <input type="checkbox" id="check-h" class="check-oculto" onclick="toggleNivel('check-h', 'n-h')">
            <label for="check-h" class="boton-check"></label>
            <label for="check-h" style="flex-grow:1; cursor:pointer;">Hero (3000 silver/lvl)</label>
            <input type="number" id="n-h" class="nivel-input" placeholder="Lvl">
        </div>
        <div class="lider-fila">

            <label for="check-c1" class="boton-check"></label>

            <input type="number" id="n-c1" class="nivel-input" placeholder="Lvl">
        </div>
        <div class="lider-fila">
            <input type="checkbox" id="check-c2" class="check-oculto" onclick="toggleNivel('check-c2', 'n-c2')">
            <label for="check-c2" class="boton-check"></label>
            <label for="check-c2" style="flex-grow:1; cursor:pointer;">Captain 2</label>
            <input type="number" id="n-c2" class="nivel-input" placeholder="Lvl">
        </div>
        <div class="lider-fila">
            <input type="checkbox" id="check-c3" class="check-oculto" onclick="toggleNivel('check-c3', 'n-c3')">
            <label for="check-c3" class="boton-check"></label>
            <label for="check-c3" style="flex-grow:1; cursor:pointer;">Captain 3</label>
            <input type="number" id="n-c3" class="nivel-input" placeholder="Lvl">
        </div>
    </div>

    <div class="seccion">
        <h3>*LOSSES SUSTAINED*</h3>
        <div id="contenedor-tropas"></div>
        <button class="btn-add" onclick="agregarFilaTropa()">+ Add unit type</button>
    </div>
