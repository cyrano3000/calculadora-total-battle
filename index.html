<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FobS Global Calculator - V12 Fixed</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; transition: direction 0.3s; }
        .contenedor { max-width: 850px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        .lang-selector { text-align: right; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        [dir="rtl"] .lang-selector { text-align: left; }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 8px; }
        [dir="rtl"] h3 { border-left: none; border-right: 5px solid #8b5a2b; padding-left: 0; padding-right: 15px; }
        .fila-dinamica { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; margin-bottom: 15px; transition: 0.3s; }
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        .caja-input label { display: block; color: #d4af37; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .btn-calc { background: #8b5a2b; color: white; border: none; padding: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }
        .boton-check { width: 24px; height: 24px; border: 2px solid #d4af37; border-radius: 4px; cursor: pointer; background: #1a110a; position: relative; flex-shrink: 0; }
        .check-oculto:checked + .boton-check { background: #4a7c44; }
        .check-oculto:checked + .boton-check::after { content: '✔'; color: white; position: absolute; left: 4px; top: -2px; font-size: 18px; }
        .check-oculto { display: none; }
        .fila-check { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #3d2b1f; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="contenedor" id="main-container">
    <div class="lang-selector">
        <select id="select-idioma" onchange="cambiarIdioma()">
            <option value="en">English 🇬🇧</option>
            <option value="es" selected>Español 🇪🇸</option>
            <option value="it">Italiano 🇮🇹</option>
            <option value="ar">العربية 🇸🇦</option>
            <option value="pt">Português 🇧🇷</option>
            <option value="fr">Français 🇫🇷</option>
            <option value="de">Deutsch 🇩🇪</option>
            <option value="ru">Русский 🇷🇺</option>
            <option value="tr">Türkçe 🇹🇷</option>
        </select>
    </div>

    <h2 id="txt-titulo">Calculadora de Compensación</h2>

    <h3 id="txt-sec-lideres">1. Líderes Capturados</h3>
    <div id="lista-lideres"></div>
    <button class="btn-add" id="btn-add-lider" onclick="nuevoLider()">+ Añadir Líder</button>

    <h3 id="txt-sec-tropas">2. Pérdidas de Tropas</h3>
    <div id="lista-tropas"></div>
    <button class="btn-add" id="btn-add-tropa" onclick="nuevaFilaTropa()">+ Añadir Tropa</button>

    <h3 id="txt-sec-recursos">3. Recursos Robados</h3>
    <div id="lista-recursos"></div>
    <button class="btn-add" id="btn-add-recurso" onclick="nuevoRecurso()">+ Añadir Recurso</button>

    <h3 id="txt-sec-clan">4. Edificios de Clan</h3>
    <div class="fila-check">
        <input type="checkbox" id="check-portal" class="check-oculto">
        <label for="check-portal" class="boton-check"></label>
        <label for="check-portal" id="lbl-portal" style="flex-grow:1; cursor:pointer;">Portal Destruido (+5M Plata)</label>
    </div>
    <div class="grid-triple">
        <div class="caja-input"><label id="lbl-wall">Muros Ciudad</label><input type="number" id="wall-lvl" min="0" max="45" placeholder="Nivel"></div>
        <div class="caja-input"><label id="lbl-fort">Fortaleza</label><input type="number" id="fort-lvl" min="0" max="25" placeholder="Nivel"></div>
        <div class="caja-input"><label id="lbl-cap">Capital</label><input type="number" id="cap-lvl" min="0" max="25" placeholder="Nivel"></div>
    </div>

    <div class="total-box">
        <p><span id="txt-mostrar-como">Mostrar como:</span> 
            <input type="radio" name="m" value="p" id="m-p"> <label for="m-p" id="lbl-silver">Plata</label>
            <input type="radio" name="m" value="o" id="m-o" checked> <label for="m-o" id="lbl-gold">Oro</label>
        </p>
        <button class="btn-calc" id="btn-calc" onclick="calcular()">Calcular</button>
        <span id="total-final">0</span>
        <small id="txt-moneda">monedas de oro</small>
    </div>
</div>

<script>
    const i18n = {
        es: { titulo: "Calculadora de Compensación", secLideres: "1. Líderes Capturados", secTropas: "2. Pérdidas de Tropas", secRecursos: "3. Recursos Robados", secClan: "4. Edificios de Clan", btnAddLider: "+ Añadir Líder", btnAddTropa: "+ Añadir Tropa", btnAddRecurso: "+ Añadir Recurso", lblPortal: "Portal Destruido (+5M Plata)", lblWall: "Muros Ciudad", lblFort: "Fortaleza", lblCap: "Capital", mostrarComo: "Mostrar como:", btnCalc: "Calcular Compensación", monedaOro: "monedas de oro", monedaPlata: "plata", cat: "Categoría", cant: "Cant", her: "Héroe", cap: "Capitán", oro: "Oro", ace: "Aceite (TAR)", pla: "Plata", pie: "Piedra", mad: "Madera", hie: "Hierro", rtl: false,
              units: { "Guards": "Guardias", "Specialists": "Especialistas", "Siege": "Asedio", "Monsters": "Monstruos", "Temp Mercs": "Mercenarios Temporales", "Mounted": "Montada", "Flying": "Voladora", "Melee/Ranged": "Cuerpo a Cuerpo/Rango", "Flying/Melee/Ranged": "Voladora/Meele/Rango", "Scouts": "Exploradores", "Default Units": "Unidades Estándar", "Tier": "Rango", "G-": "G-", "S-": "E-" } },
        en: { titulo: "Compensation Calculator", secLideres: "1. Captured Leaders", secTropas: "2. Unit Losses", secRecursos: "3. Stolen Resources", secClan: "4. Clan Buildings", btnAddLider: "+ Add Leader", btnAddTropa: "+ Add Unit", btnAddRecurso: "+ Add Resource", lblPortal: "Portal Destroyed (+5M Silver)", lblWall: "City Walls", lblFort: "Fortress", lblCap: "Capital", mostrarComo: "Display as:", btnCalc: "Calculate Compensation", monedaOro: "gold coins", monedaPlata: "silver", cat: "Category", cant: "Qty", her: "Hero", cap: "Captain", oro: "Gold", ace: "TAR (Oil)", pla: "Silver", pie: "Stone", mad: "Wood", hie: "Iron", rtl: false,
              units: { "Guards": "Guards", "Specialists": "Specialists", "Siege": "Siege", "Monsters": "Monsters", "Temp Mercs": "Temp Mercs", "Mounted": "Mounted", "Flying": "Flying", "Melee/Ranged": "Melee/Ranged", "Flying/Melee/Ranged": "Flying/Melee/Ranged", "Scouts": "Scouts", "Default Units": "Default Units", "Tier": "Tier", "G-": "G-", "S-": "S-" } },
        it: { titulo: "Calcolatore di Compensazione", secLideres: "1. Leader Catturati", secTropas: "2. Perdite di Truppe", secRecursos: "3. Risorse Rubate", secClan: "4. Edifici del Clan", btnAddLider: "+ Aggiungi Leader", btnAddTropa: "+ Aggiungi Truppa", btnAddRecurso: "+ Aggiungi Risorsa", lblPortal: "Portale Distrutto (+5M Argento)", lblWall: "Mura della Città", lblFort: "Fortezza", lblCap: "Capitale", mostrarComo: "Mostra come:", btnCalc: "Calcola Compensazione", monedaOro: "monete d'oro", monedaPlata: "argento", cat: "Categoria", cant: "Qta", her: "Eroe", cap: "Capitano", oro: "Oro", ace: "Olio (TAR)", pla: "Argento", pie: "Pietra", mad: "Legno", hie: "Ferro", rtl: false,
              units: { "Guards": "Guardie", "Specialists": "Spécialisti", "Siege": "Assedio", "Monsters": "Mostri", "Temp Mercs": "Mercenari Temporanei", "Mounted": "Cavalleria", "Flying": "Volante", "Melee/Ranged": "Mischia/Distanza", "Flying/Melee/Ranged": "Volante/Mischia/Distanza", "Scouts": "Esploratori", "Default Units": "Unità Base", "Tier": "Livello", "G-": "G-", "S-": "S-" } },
        ar: { titulo: "حاسبة التعويضات", secLideres: "1. القادة المأسورون", secTropas: "2. خسائر الوحدات", secRecursos: "3. الموارد المسروقة", secClan: "4. مباني القبيلة", btnAddLider: "+ إضافة قائد", btnAddTropa: "+ إضافة وحدة", btnAddRecurso: "+ إضافة مورد", lblPortal: "بوابة مدمرة (+5M فضة)", lblWall: "أسوار المدينة", lblFort: "الحصن", lblCap: "العاصمة", mostrarComo: "عرض كـ:", btnCalc: "احسب التعويض", monedaOro: "عملات ذهبية", monedaPlata: "فضة", cat: "الفئة", cant: "الكمية", her: "بطل", cap: "قائد", oro: "ذهب", ace: "نفط (TAR)", pla: "فضة", pie: "حجر", mad: "خشب", hie: "حديد", rtl: true,
              units: { "Guards": "الحراس", "Specialists": "المتخصصون", "Siege": "الحصار", "Monsters": "الوحوش", "Temp Mercs": "مرتزقة مؤقتون", "Mounted": "فرسان", "Flying": "طيران", "Melee/Ranged": "اشتباك/رماة", "Flying/Melee/Ranged": "طيران/اشتباك/رماة", "Scouts": "كشافة", "Default Units": "وحدات افتراضية", "Tier": "فئة", "G-": "ج-", "S-": "خ-" } }
    };

    let idm = 'es';

    const DB_T = {
        "Guards": { "Mounted": 1265, "Flying": 12640, "Melee/Ranged": 630 },
        "Specialists": { "Mounted": 1390, "Flying/Melee/Ranged": 695, "Scouts": 6320 },
        "Siege": { "Default Units": 3475 },
        "Monsters": { "Tier III": 4000, "Tier IV": 8000, "Tier V": 12000, "Tier VI": 18000, "Tier VII": 24000, "Tier I": 29000, "Tier II": 32000 },
        "Temp Mercs": { "G-Mounted": 2530, "G-Flying": 25300, "G-Melee/Ranged": 1265, "S-Mounted": 2780, "S-Flying": 27800, "S-Melee/Ranged": 1390, "S-Scouts": 6950, "Siege": 12650, "Monster: Mounted": 5300, "Monster: Flying": 7585, "Monster: Melee/Ranged": 5000 }
    };

    function cambiarIdioma() {
        idm = document.getElementById('select-idioma').value;
        const t = i18n[idm];
        document.body.dir = t.rtl ? 'rtl' : 'ltr';
        document.getElementById('main-container').dir = t.rtl ? 'rtl' : 'ltr';
        document.getElementById('txt-titulo').innerText = t.titulo;
        document.getElementById('txt-sec-lideres').innerText = t.secLideres;
        document.getElementById('txt-sec-tropas').innerText = t.secTropas;
        document.getElementById('txt-sec-recursos').innerText = t.secRecursos;
        document.getElementById('txt-sec-clan').innerText = t.secClan;
        document.getElementById('btn-add-lider').innerText = t.btnAddLider;
        document.getElementById('btn-add-tropa').innerText = t.btnAddTropa;
        document.getElementById('btn-add-recurso').innerText = t.btnAddRecurso;
        document.getElementById('lbl-portal').innerText = t.lblPortal;
        document.getElementById('lbl-wall').innerText = t.lblWall;
        document.getElementById('lbl-fort').innerText = t.lblFort;
        document.getElementById('lbl-cap').innerText = t.lblCap;
        document.getElementById('txt-mostrar-como').innerText = t.mostrarComo;
        document.getElementById('btn-calc').innerText = t.btnCalc;
        document.getElementById('lbl-silver').innerText = t.pla;
        document.getElementById('lbl-gold').innerText = t.oro;
        
        document.getElementById('lista-lideres').innerHTML = '';
        document.getElementById('lista-tropas').innerHTML = '';
        document.getElementById('lista-recursos').innerHTML = '';
        calcular();
    }

    function traducirUnidad(nombreOriginal) {
        const u = i18n[idm].units;
        if(u[nombreOriginal]) return u[nombreOriginal];
        
        let final = nombreOriginal;
        if(final.includes("Tier")) final = final.replace("Tier", u["Tier"]);
        if(final.startsWith("G-")) final = u["G-"] + (u[final.substring(2)] || final.substring(2));
        else if(final.startsWith("S-")) final = u["S-"] + (u[final.substring(2)] || final.substring(2));
        else if(final.includes("Monster: ")) {
            const tipo = final.split(": ")[1];
            final = u["Monsters"] + ": " + (u[tipo] || tipo);
        }
        return final;
    }

    function nuevoLider() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select><option value="3000">${i18n[idm].her}</option><option value="3000">${i18n[idm].cap}</option></select>
            <input type="number" class="lvl-lider" placeholder="Lvl" min="1" value="1">
            <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">✖</button>`;
        document.getElementById('lista-lideres').appendChild(div);
    }

    function nuevaFilaTropa() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        const t_units = i18n[idm].units;
        let opt = Object.keys(DB_T).map(c => `<option value="${c}">${t_units[c] || c}</option>`).join('');
        div.innerHTML = `<select onchange="updateSubTropa(this)"><option value="">${i18n[idm].cat}</option>${opt}</select>
            <select class="sub-t" style="display:none"></select>
            <input type="number" class="qty" placeholder="${i18n[idm].cant}" min="1">
            <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">✖</button>`;
        document.getElementById('lista-tropas').appendChild(div);
    }

    function updateSubTropa(sel) {
        const sub = sel.parentElement.querySelector('.sub-t');
        if(sel.value) {
            sub.innerHTML = Object.entries(DB_T[sel.value]).map(([n,v]) => {
                return `<option value="${v}">${traducirUnidad(n)} (${v})</option>`;
            }).join('');
            sub.style.display = "block";
        }
    }

    function nuevoRecurso() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        const t = i18n[idm];
        div.innerHTML = `<select class="tipo-recurso"><option value="3000">${t.oro}</option><option value="4500">${t.ace}</option><option value="1">${t.pla}</option><option value="0">${t.pie}</option><option value="0">${t.mad}</option><option value="0">${t.hie}</option></select>
            <input type="number" class="qty-recurso" placeholder="${t.cant}" min="1" value="1">
            <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">✖</button>`;
        document.getElementById('lista-recursos').appendChild(div);
    }

    function calcular() {
        let total = 0;
        document.querySelectorAll('.lvl-lider').forEach(input => total += (parseInt(input.value) || 1) * 3000);
        document.querySelectorAll('#lista-tropas .fila-dinamica').forEach(f => total += (parseInt(f.querySelector('.qty').value) || 0) * (parseInt(f.querySelector('.sub-t').value) || 0));
        document.querySelectorAll('.qty-recurso').forEach(f => total += (parseInt(f.value) || 0) * (parseInt(f.parentElement.querySelector('select').value) || 0));
        
        if(document.getElementById('check-portal').checked) total += 5000000;
        total += (parseInt(document.getElementById('wall-lvl').value) || 0) * 1000000;
        total += (parseInt(document.getElementById('fort-lvl').value) || 0) * 50000000;
        total += (parseInt(document.getElementById('cap-lvl').value) || 0) * 450000000;
        
        const isG = document.getElementById('m-o').checked;
        document.getElementById('total-final').innerText = Math.round(isG ? total/3000 : total).toLocaleString();
        document.getElementById('txt-moneda').innerText = isG ? i18n[idm].monedaOro : i18n[idm].monedaPlata;
    }
</script>
</body>
</html>
