<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FobS Compensation Calculator - Final Version</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 800px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); }
        .campo-fijo { background: #120c08; color: #7a6b5d; border: 1px solid #443322; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; cursor: not-allowed; }
        select, input[type="number"] { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; flex-grow: 1; }
        .lider-fila { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; }
        .check-oculto { display: none; }
        .boton-check { width: 24px; height: 24px; border: 2px solid #d4af37; border-radius: 4px; cursor: pointer; background: #1a110a; position: relative; }
        .check-oculto:checked + .boton-check { background: #4a7c44; border-color: #76b06d; }
        .check-oculto:checked + .boton-check::after { content: '✔'; color: white; position: absolute; left: 4px; top: -2px; font-size: 18px; }
        .nivel-input { display: none; width: 100px; text-align: center; }
        .fila { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3em; color: #d4af37; font-weight: bold; display: block; }
        .btn-calc { background: #8b5a2b; color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>### Registered Attack Report ###</h2>

    <div class="seccion">
        <h3>*BASE FINE*</h3>
        <input type="text" value="5,000,000 Silver" class="campo-fijo" readonly>
    </div>

    <div class="seccion">
        <h3>*LEADERS STATUS*</h3>
        <div class="lider-fila">
            <input type="checkbox" id="check-h" class="check-oculto" onclick="toggleNivel('check-h', 'n-h')">
            <label for="check-h" class="boton-check"></label>
            <label for="check-h" style="flex-grow:1;">Hero (3000 silver/lvl)</label>
            <input type="number" id="n-h" class="nivel-input" placeholder="Lvl">
        </div>
        <div class="lider-fila"><input type="checkbox" id="check-c1" class="check-oculto" onclick="toggleNivel('check-c1', 'n-c1')"><label for="check-c1" class="boton-check"></label><label style="flex-grow:1;">Captain 1</label><input type="number" id="n-c1" class="nivel-input" placeholder="Lvl"></div>
        <div class="lider-fila"><input type="checkbox" id="check-c2" class="check-oculto" onclick="toggleNivel('check-c2', 'n-c2')"><label for="check-c2" class="boton-check"></label><label style="flex-grow:1;">Captain 2</label><input type="number" id="n-c2" class="nivel-input" placeholder="Lvl"></div>
        <div class="lider-fila"><input type="checkbox" id="check-c3" class="check-oculto" onclick="toggleNivel('check-c3', 'n-c3')"><label for="check-c3" class="boton-check"></label><label style="flex-grow:1;">Captain 3</label><input type="number" id="n-c3" class="nivel-input" placeholder="Lvl"></div>
    </div>

    <div class="seccion">
        <h3>*LOSSES SUSTAINED*</h3>
        <div id="contenedor-tropas"></div>
        <button class="btn-add" onclick="agregarFilaTropa()">+ Add unit type</button>
    </div>

    <div class="total-box">
        <p>VIEW AS: 
            <input type="radio" name="moneda" value="plata" id="r-plata"> <label for="r-plata">Silver</label>
            <input type="radio" name="moneda" value="oro" id="r-oro" checked> <label for="r-oro">Gold</label>
        </p>
        <button class="btn-calc" onclick="calcular()">Calculate Compensation</button>
        <span id="total-final">0</span>
        <small id="tipo-texto">gold coins</small>
    </div>
</div>

<script>
    const datosTropas = {
        "Guards": { 
            "Mounted": 1250, 
            "Flying": 12500, 
            "Melee/Ranged": 625 
        },
        "Specialists": { 
            "Mounted": 1400, 
            "Flying/Melee/Ranged": 700, 
            "Scouts": 3500 
        },
        "Siege": { 
            "Default": 6250 
        },
        "Monsters": { 
            "T-III": 4000, "T-IV": 8000, "T-V": 12000, "T-VI": 18000, 
            "T-VII": 24000, "T-I": 29000, "T-II": 32000 
        },
        "Temp Mercenaries": { 
            "Guard: Mounted": 2500, 
            "Guard: Flying": 25000, 
            "Guard: Melee/Ranged": 1250,
            "Spec: Mounted": 2800, 
            "Spec: Flying": 28000, 
            "Spec: Melee/Ranged": 1400, 
            "Spec: Scouts": 7000,
            "Siege": 12500, 
            "Monster: Mounted": 5300, 
            "Monster: Flying": 7600, 
            "Monster: Melee/Ranged": 5000 
        }
    };

    function toggleNivel(checkId, inputId) {
        const input = document.getElementById(inputId);
        input.style.display = document.getElementById(checkId).checked ? "block" : "none";
    }

    function agregarFilaTropa() {
        const container = document.getElementById('contenedor-tropas');
        const div = document.createElement('div');
        div.className = 'fila';
        let cats = Object.keys(datosTropas).map(c => `<option value="${c}">${c}</option>`).join('');
        div.innerHTML = `<select onchange="actualizarSub(this)"><option value="">Category</option>${cats}</select>
            <select class="tropa-tipo" style="display:none;"></select>
            <input type="number" class="cant-tropa" placeholder="Qty">
            <button onclick="this.parentElement.remove()">❌</button>`;
        container.appendChild(div);
    }

    function actualizarSub(s) {
        const sub = s.parentElement.querySelector('.tropa-tipo');
        if(s.value) {
            sub.innerHTML = Object.entries(datosTropas[s.value]).map(([n,v])=>`<option value="${v}">${n} (${v.toLocaleString()})</option>`).join('');
            sub.style.display = "block";
        }
    }

    function calcular() {
        let totalPlata = 5000000;
        ['n-h', 'n-c1', 'n-c2', 'n-c3'].forEach(id => {
            let el = document.getElementById(id);
            if(el && el.style.display === "block") totalPlata += (parseInt(el.value) || 0) * 3000;
        });
        document.querySelectorAll('.fila').forEach(f => {
            let cant = parseInt(f.querySelector('.cant-tropa').value) || 0;
            let val = parseInt(f.querySelector('.tropa-tipo').value) || 0;
            totalPlata += (cant * val);
        });
        const oro = document.querySelector('input[name="moneda"]:checked').value === "oro";
        document.getElementById('total-final').innerText = Math.round(oro ? totalPlata/3000 : totalPlata).toLocaleString();
        document.getElementById('tipo-texto').innerText = oro ? "gold coins" : "silver";
    }
</script>
</body>
</html>
