<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K239 Calculator V25 - Strict Limit</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 850px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        .lang-selector { text-align: right; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 8px; }
        .fila-dinamica { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px; transition: 0.3s; }
        .btn-add:hover:not(:disabled) { background: #5da356; }
        /* Estilo para botón desactivado */
        .btn-add:disabled { background: #444 !important; color: #888; cursor: not-allowed; border: 1px solid #555; }
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        .caja-input label { display: block; color: #d4af37; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .btn-share { background: #d4af37; color: #1a110a; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; text-transform: uppercase; }
        .footer-clan { margin-top: 40px; text-align: center; color: #8b5a2b; font-weight: bold; letter-spacing: 3px; border-top: 1px solid #3d2b1f; padding-top: 20px; font-size: 1.2em; }
        .fixed-notice { font-size: 0.9em; color: #aaa; margin-bottom: 10px; font-style: italic; text-align: center; }
    </style>
</head>
<body onload="actualizarInterfaz()">

<div class="contenedor">
    <div class="lang-selector">
        <select id="select-idioma" onchange="actualizarInterfaz()">
            <option value="es" selected>Español 🇪🇸</option>
            <option value="en">English 🇬🇧</option>
        </select>
    </div>

    <h2 id="txt-titulo">Calculadora K239</h2>
    <div class="fixed-notice" id="txt-fixed">Base Ataque: +5M Plata incluido</div>

    <h3 id="txt-sec1">1. Líderes (Máx 4: 1 Héroe + 3 Caps)</h3>
    <div id="lista-lideres"></div>
    <button class="btn-add" id="btn-lider" onclick="nuevoLider()">+ Añadir Líder</button>

    <h3 id="txt-sec2">2. Pérdidas de Tropas</h3>
    <div id="lista-tropas"></div>
    <button class="btn-add" id="btn-tropa" onclick="nuevaFilaTropa()">+ Añadir Tropa</button>

    <h3 id="txt-sec3">3. Recursos Robados</h3>
    <div id="lista-recursos"></div>
    <button class="btn-add" id="btn-recurso" onclick="nuevoRecurso()">+ Añadir Recurso</button>

    <h3 id="txt-sec4">4. Edificios de Clan</h3>
    <div style="margin-bottom:15px;"><input type="checkbox" id="check-portal" onchange="calcular()"><label id="lbl-portal" for="check-portal" style="cursor:pointer"> Portal Destruido (+5M Plata)</label></div>
    
    <div class="grid-triple">
        <div class="caja-input"><label id="lbl-wall">Muros</label><input type="number" id="wall-lvl" placeholder="Lvl" oninput="calcular()"></div>
        <div class="caja-input"><label id="lbl-fort">Fortaleza</label><input type="number" id="fort-lvl" placeholder="Lvl" oninput="calcular()"></div>
        <div class="caja-input"><label id="lbl-cap">Capital</label><input type="number" id="cap-lvl" placeholder="Lvl" oninput="calcular()"></div>
    </div>

    <div class="total-box">
        <div>
            <input type="radio" name="m" id="m-p" onchange="calcular()"> <label for="m-p" id="lbl-p">Plata</label>
            <input type="radio" name="m" id="m-o" checked onchange="calcular()"> <label for="m-o" id="lbl-o">Oro</label>
        </div>
        <span id="total-final">0</span>
        <small id="txt-moneda">monedas de oro</small>
        <button class="btn-share" id="btn-share" onclick="compartir()">Generar Resumen</button>
    </div>

    <div class="footer-clan">@WSB</div>
</div>

<script>
    const i18n = {
        es: {
            tit: "Calculadora de Compensación K239", fix: "Base Ataque: +5M Plata incluido",
            s1: "1. Líderes (Máx 4: 1 Héroe + 3 Caps)", s2: "2. Pérdidas de Tropas", s3: "3. Recursos Robados", s4: "4. Edificios de Clan",
            bl: "+ Añadir Líder", bt: "+ Añadir Tropa", br: "+ Añadir Recurso",
            lp: "Portal Destruido (+5M Plata)", lw: "Muros", lf: "Fortaleza", lc: "Capital",
            rp: "Plata", ro: "Oro", bsh: "Generar Resumen", m_o: "monedas de oro", m_p: "plata",
            hero: "Héroe", cap: "Capitán", qty: "Cant", share: "--- RESUMEN K239 ---",
            Mounted: "Montada", Flying: "Voladora (Arqueros)", MeleeRanged: "Melé/Rango", Scouts: "Exploradores", Siege: "Asedio", Monster: "Monstruo",
            Guards: "Guardias", Specialists: "Especialistas"
        },
        en: {
            tit: "K239 Compensation Calculator", fix: "Base Attack: +5M Silver included",
            s1: "1. Leaders (Max 4: 1 Hero + 3 Caps)", s2: "2. Unit Losses", s3: "3. Stolen Resources", s4: "4. Clan Buildings",
            bl: "+ Add Leader", bt: "+ Add Unit Row", br: "+ Add Resource",
            lp: "Portal Destroyed (+5M Silver)", lw: "Walls", lf: "Fortress", lc: "Capital",
            rp: "Silver", ro: "Gold", bsh: "Generate Summary", m_o: "gold coins", m_p: "silver",
            hero: "Hero", cap: "Captain", qty: "Qty", share: "--- K239 SUMMARY ---",
            Mounted: "Mounted", Flying: "Flying (Archers)", MeleeRanged: "Melee/Ranged", Scouts: "Scouts", Siege: "Siege", Monster: "Monster",
            Guards: "Guards", Specialists: "Specialists"
        }
    };

    const dbTropas = {
        "Guards": { "Mounted": 1265, "Flying": 12640, "MeleeRanged": 630 },
        "Specialists": { "Mounted": 1390, "Flying": 13900, "MeleeRanged": 695, "Scouts": 6320 },
        "Siege": { "Siege": 6325 },
        "Monster": { "Mounted": 2650, "Flying": 3790, "MeleeRanged": 2500 }
    };

    function actualizarInterfaz() {
        const lang = document.getElementById('select-idioma').value;
        const t = i18n[lang];

        document.getElementById('txt-titulo').innerText = t.tit;
        document.getElementById('txt-fixed').innerText = t.fix;
        document.getElementById('txt-sec1').innerText = t.s1;
        document.getElementById('txt-sec2').innerText = t.s2;
        document.getElementById('txt-sec3').innerText = t.s3;
        document.getElementById('txt-sec4').innerText = t.s4;
        document.getElementById('btn-lider').innerText = t.bl;
        document.getElementById('btn-tropa').innerText = t.bt;
        document.getElementById('btn-recurso').innerText = t.br;
        document.getElementById('lbl-portal').innerText = t.lp;
        document.getElementById('lbl-wall').innerText = t.lw;
        document.getElementById('lbl-fort').innerText = t.lf;
        document.getElementById('lbl-cap').innerText = t.lc;
        document.getElementById('lbl-p').innerText = t.rp;
        document.getElementById('lbl-o').innerText = t.ro;
        document.getElementById('btn-share').innerText = t.bsh;

        document.querySelectorAll('.fila-tropa').forEach(fila => {
            const catSel = fila.querySelector('.cat-sel');
            const subSel = fila.querySelector('.sub-t');
            if(catSel.value) u(catSel, subSel.value);
        });

        document.querySelectorAll('.sel-tipo-lider').forEach(sel => {
            const current = sel.value;
            sel.options[0].text = t.hero;
            sel.options[1].text = t.cap;
            sel.value = current;
        });

        checkLimitesLideres();
        calcular();
    }

    // --- BLOQUEO ESTRICTO DE LÍDERES ---
    function nuevoLider() {
        const lista = document.getElementById('lista-lideres');
        // Bloqueo de seguridad nivel 1: Cantidad de hijos
        if (lista.children.length >= 4) {
            checkLimitesLideres();
            return; 
        }

        const lang = document.getElementById('select-idioma').value;
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `
            <select class="sel-tipo-lider" onchange="vL(this)">
                <option value="hero">${i18n[lang].hero}</option>
                <option value="cap">${i18n[lang].cap}</option>
            </select>
            <input type="number" class="lvl-lider" value="1" min="1" oninput="calcular()">
            <button onclick="this.parentElement.remove(); checkLimitesLideres();" style="color:red;background:none;border:none;cursor:pointer;font-weight:bold;">✖</button>`;
        
        lista.appendChild(div);
        vL(div.querySelector('select'));
        checkLimitesLideres();
    }

    function vL(s) {
        const all = document.querySelectorAll('.sel-tipo-lider');
        let h = 0, c = 0;
        all.forEach(sel => { if(sel.value==='hero') h++; else c++; });
        
        // Bloqueo nivel 2: Tipos (Max 1 Héroe, Max 3 Caps)
        if(h > 1) { s.value = 'cap'; } 
        else if(c > 3) { s.value = 'hero'; }
        
        calcular();
    }

    function checkLimitesLideres() {
        const total = document.querySelectorAll('.sel-tipo-lider').length;
        const btn = document.getElementById('btn-lider');
        // Bloqueo nivel 3: Desactivar botón visualmente
        btn.disabled = (total >= 4);
        calcular();
    }

    // --- RESTO DE FUNCIONES (Tropas y Recursos) ---
    function nuevaFilaTropa() {
        const lang = document.getElementById('select-idioma').value;
        const t = i18n[lang];
        const div = document.createElement('div');
        div.className = 'fila-dinamica fila-tropa';
        div.innerHTML = `
            <select class="cat-sel" onchange="u(this)">
                <option value="">Cat</option>
                <option value="Guards">${t.Guards}</option>
                <option value="Specialists">${t.Specialists}</option>
                <option value="Siege">${t.Siege}</option>
                <option value="Monster">${t.Monster}</option>
            </select>
            <select class="sub-t" style="display:none" onchange="calcular()"></select>
            <input type="number" class="qty" placeholder="${t.qty}" oninput="calcular()">
            <button onclick="this.parentElement.remove(); calcular();" style="color:red;background:none;border:none;cursor:pointer;font-weight:bold;">✖</button>`;
        document.getElementById('lista-tropas').appendChild(div);
    }

    function u(s, valorPrevio = null) {
        const lang = document.getElementById('select-idioma').value;
        const sub = s.parentElement.querySelector('.sub-t');
        const cat = s.value;
        if(cat) {
            sub.innerHTML = Object.entries(dbTropas[cat]).map(([key, val]) => 
                `<option value="${val}" ${val == valorPrevio ? 'selected' : ''}>${i18n[lang][key] || key}</option>`
            ).join('');
            sub.style.display = "block";
        } else { sub.style.display = "none"; }
        calcular();
    }

    function nuevoRecurso() {
        const lang = document.getElementById('select-idioma').value;
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select class="tipo-r"><option value="3000">${i18n[lang].ro}</option><option value="1">${i18n[lang].rp}</option></select>
        <input type="number" class="qty-r" placeholder="${i18n[lang].qty}" oninput="calcular()"><button onclick="this.parentElement.remove(); calcular();" style="color:red;background:none;border:none;cursor:pointer;font-weight:bold;">✖</button>`;
        document.getElementById('lista-recursos').appendChild(div);
    }

    function calcular() {
        let p = 5000000;
        const lang = document.getElementById('select-idioma').value;
        document.querySelectorAll('.lvl-lider').forEach(i => p += (parseInt(i.value)||0)*3000);
        document.querySelectorAll('.qty').forEach(i => {
            const sub = i.parentElement.querySelector('.sub-t');
            if(sub && sub.style.display !== 'none') p += (parseInt(i.value)||0)*(parseInt(sub.value)||0);
        });
        document.querySelectorAll('.qty-r').forEach(i => p += (parseInt(i.value)||0)*(parseInt(i.parentElement.querySelector('.tipo-r').value)||0));
        if(document.getElementById('check-portal').checked) p += 5000000;
        p += (parseInt(document.getElementById('wall-lvl').value)||0)*1000000;
        p += (parseInt(document.getElementById('fort-lvl').value)||0)*50000000;
        p += (parseInt(document.getElementById('cap-lvl').value)||0)*450000000;

        const isO = document.getElementById('m-o').checked;
        document.getElementById('total-final').innerText = Math.round(isO ? p/3000 : p).toLocaleString();
        document.getElementById('txt-moneda').innerText = isO ? i18n[lang].m_o : i18n[lang].m_p;
        return p;
    }

    function compartir() {
        const p = calcular();
        const lang = document.getElementById('select-idioma').value;
        let txt = `${i18n[lang].share}\nClan: @WSB\n\n• ${i18n[lang].fix}\n💰 ORO: ${Math.round(p/3000).toLocaleString()}\n🪙 PLATA: ${p.toLocaleString()}\n\nVerified by @WSB Tool`;
        navigator.clipboard.writeText(txt);
        alert(lang === 'es' ? "¡Resumen copiado!" : "Summary copied!");
    }
</script>
</body>
</html>
