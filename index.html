<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K239 Kingdom Compensation Calculator</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 850px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); position: relative; }
        .lang-selector { text-align: right; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 8px; }
        .fila-dinamica { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px; }
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        .caja-input label { display: block; color: #d4af37; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .btn-share { background: #d4af37; color: #1a110a; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; text-transform: uppercase; }
        .fila-check { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #3d2b1f; margin-bottom: 8px; }
        .footer-clan { margin-top: 40px; text-align: center; color: #8b5a2b; font-weight: bold; letter-spacing: 3px; border-top: 1px solid #3d2b1f; padding-top: 20px; font-size: 1.2em; }
    </style>
</head>
<body onload="cambiarIdioma()">

<div class="contenedor">
    <div class="lang-selector">
        <select id="select-idioma" onchange="cambiarIdioma()">
            <option value="en" selected>English 🇬🇧</option>
            <option value="es">Español 🇪🇸</option>
            <option value="it">Italiano 🇮🇹</option>
            <option value="pt">Português 🇧🇷</option>
        </select>
    </div>

    <h2 id="txt-titulo">K239 Kingdom Compensation Calculator</h2>

    <h3 id="txt-sec-lideres">1. Captured Leaders</h3>
    <div id="lista-lideres"></div>
    <button class="btn-add" id="btn-add-lider" onclick="nuevoLider()">+ Add Leader</button>

    <h3 id="txt-sec-tropas">2. Unit Losses</h3>
    <div id="lista-tropas"></div>
    <button class="btn-add" id="btn-add-tropa" onclick="nuevaFilaTropa()">+ Add Unit Row</button>

    <h3 id="txt-sec-recursos">3. Stolen Resources</h3>
    <div id="lista-recursos"></div>
    <button class="btn-add" id="btn-add-recurso" onclick="nuevoRecurso()">+ Add Resource</button>

    <h3 id="txt-sec-clan">4. Clan Buildings</h3>
    <div class="fila-check">
        <input type="checkbox" id="check-portal" onchange="calcular()">
        <label id="lbl-portal">Portal Destroyed (+5M Silver)</label>
    </div>
    <div class="grid-triple">
        <div class="caja-input"><label id="lbl-wall">City Walls</label><input type="number" id="wall-lvl" placeholder="Lvl" oninput="calcular()"></div>
        <div class="caja-input"><label id="lbl-fort">Fortress</label><input type="number" id="fort-lvl" placeholder="Lvl" oninput="calcular()"></div>
        <div class="caja-input"><label id="lbl-cap">Capital</label><input type="number" id="cap-lvl" placeholder="Lvl" oninput="calcular()"></div>
    </div>

    <div class="total-box">
        <div>
            <input type="radio" name="m" value="p" id="m-p" onchange="calcular()"> <label for="m-p" id="lbl-silver-radio">Silver</label>
            <input type="radio" name="m" value="o" id="m-o" checked onchange="calcular()"> <label for="m-o" id="lbl-gold-radio">Gold</label>
        </div>
        <span id="total-final">0</span>
        <small id="txt-moneda-label">gold coins</small>
        <button class="btn-share" id="btn-share" onclick="compartir()">Generate Summary</button>
    </div>

    <div class="footer-clan">@WSB</div>
</div>

<script>
    const i18n = {
        en: { titulo: "K239 Kingdom Compensation Calculator", secLideres: "1. Captured Leaders", secTropas: "2. Unit Losses", secRecursos: "3. Stolen Resources", secClan: "4. Clan Buildings", btnAddLider: "+ Add Leader", btnAddTropa: "+ Add Unit Row", btnAddRecurso: "+ Add Resource", lblPortal: "Portal Destroyed", lblWall: "City Walls", lblFort: "Fortress", lblCap: "Capital", btnShare: "Generate Summary", shareTitle: "--- K239 COMPENSATION SUMMARY ---", her: "Hero", cap: "Captain", qty: "Qty", silver: "Silver", gold: "Gold", goldCoins: "gold coins", units: { "Guards": "Guards", "Specialists": "Specialists", "Mounted": "Mounted" } },
        es: { titulo: "Calculadora de Compensación K239", secLideres: "1. Líderes Capturados", secTropas: "2. Pérdidas de Tropas", secRecursos: "3. Recursos Robados", secClan: "4. Edificios de Clan", btnAddLider: "+ Añadir Líder", btnAddTropa: "+ Añadir Tropa", btnAddRecurso: "+ Añadir Recurso", lblPortal: "Portal Destruido", lblWall: "Muros Ciudad", lblFort: "Fortaleza", lblCap: "Capital", btnShare: "Generar Resumen", shareTitle: "--- RESUMEN DE COMPENSACIÓN K239 ---", her: "Héroe", cap: "Capitán", qty: "Cant", silver: "Plata", gold: "Oro", goldCoins: "monedas de oro", units: { "Guards": "Guardias", "Specialists": "Especialistas", "Mounted": "Montada" } }
    };

    let idm = 'en';
    const DB_T = { "Guards": { "Mounted": 1265, "Flying": 12640, "Melee/Ranged": 630 }, "Specialists": { "Mounted": 1390, "Scouts": 6320 } };

    function cambiarIdioma() {
        idm = document.getElementById('select-idioma').value;
        const t = i18n[idm] || i18n['en'];
        document.getElementById('txt-titulo').innerText = t.titulo;
        document.getElementById('btn-share').innerText = t.btnShare;
        document.getElementById('lbl-silver-radio').innerText = t.silver;
        document.getElementById('lbl-gold-radio').innerText = t.gold;
        calcular();
    }

    function nuevoLider() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select><option value="3000">${i18n[idm].her}</option></select><input type="number" class="lvl-lider" value="1" oninput="calcular()"><button onclick="this.parentElement.remove(); calcular();">✖</button>`;
        document.getElementById('lista-lideres').appendChild(div);
    }

    function nuevaFilaTropa() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select onchange="updateSub(this)"><option value="">Cat</option>${Object.keys(DB_T).map(c=>`<option value="${c}">${c}</option>`)}</select><select class="sub-t" style="display:none" onchange="calcular()"></select><input type="number" class="qty" placeholder="${i18n[idm].qty}" oninput="calcular()"><button onclick="this.parentElement.remove(); calcular();">✖</button>`;
        document.getElementById('lista-tropas').appendChild(div);
    }

    function updateSub(sel) {
        const sub = sel.parentElement.querySelector('.sub-t');
        if(sel.value) {
            sub.innerHTML = Object.entries(DB_T[sel.value]).map(([n,v])=>`<option value="${v}">${n} (${v})</option>`).join('');
            sub.style.display = "block";
        }
        calcular();
    }

    function nuevoRecurso() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select class="tipo-res"><option value="3000">${i18n[idm].gold}</option><option value="1">${i18n[idm].silver}</option></select><input type="number" class="qty-res" placeholder="${i18n[idm].qty}" oninput="calcular()"><button onclick="this.parentElement.remove(); calcular();">✖</button>`;
        document.getElementById('lista-recursos').appendChild(div);
    }

    function calcular() {
        let totalPlata = 0;
        document.querySelectorAll('.lvl-lider').forEach(i => totalPlata += (parseInt(i.value)||0)*3000);
        document.querySelectorAll('.qty').forEach(i => totalPlata += (parseInt(i.value)||0)*(parseInt(i.parentElement.querySelector('.sub-t').value)||0));
        document.querySelectorAll('.qty-res').forEach(i => totalPlata += (parseInt(i.value)||0)*(parseInt(i.parentElement.querySelector('.tipo-res').value)||0));
        
        if(document.getElementById('check-portal').checked) totalPlata += 5000000;
        totalPlata += (parseInt(document.getElementById('wall-lvl').value)||0)*1000000;
        totalPlata += (parseInt(document.getElementById('fort-lvl').value)||0)*50000000;
        totalPlata += (parseInt(document.getElementById('cap-lvl').value)||0)*450000000;
        
        const isGold = document.getElementById('m-o').checked;
        document.getElementById('total-final').innerText = Math.round(isGold ? totalPlata/3000 : totalPlata).toLocaleString();
        document.getElementById('txt-moneda-label').innerText = isGold ? i18n[idm].goldCoins : i18n[idm].silver;
        return totalPlata;
    }

    function compartir() {
        const plata = calcular();
        const oro = Math.round(plata/3000);
        let txt = `${i18n[idm].shareTitle}\nClan: @WSB\n\n`;
        txt += `💰 TOTAL GOLD: ${oro.toLocaleString()}\n🪙 TOTAL SILVER: ${plata.toLocaleString()}\n\nVerified by K239 Calculator`;
        navigator.clipboard.writeText(txt);
        alert("K239 summary copied to clipboard!");
    }
</script>
</body>
</html>
