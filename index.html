<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FobS Compensation Calculator - Official Version</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; }
        .contenedor { max-width: 800px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.2em; margin-top: 30px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding-top: 5px; padding-bottom: 5px; }

        /* Estilo de Inputs y Selects */
        .campo-fijo { background: #120c08; color: #7a6b5d; border: 1px solid #443322; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: not-allowed; box-sizing: border-box; }
        select, input[type="number"] { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; flex-grow: 1; }
        
        /* Sección Líderes */
        .lider-fila { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #3d2b1f; }
        .check-oculto { display: none; }
        .boton-check { width: 24px; height: 24px; border: 2px solid #d4af37; border-radius: 4px; display: inline-block; cursor: pointer; background: #1a110a; position: relative; flex-shrink: 0; }
        .check-oculto:checked + .boton-check { background: #4a7c44; border-color: #76b06d; }
        .check-oculto:checked + .boton-check::after { content: '✔'; color: white; position: absolute; left: 4px; top: -2px; font-size: 18px; }
        .nivel-input { display: none; width: 120px; border: 1px solid #d4af37; text-align: center; }

        /* Filas Dinámicas */
        .fila { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-add:hover { background: #5ba354; }
        .btn-del { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 1.4em; }

        /* Resultados */
        .total-box { margin-top: 35px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3em; color: #d4af37; font-weight: bold; display: block; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .btn-calc { background: #8b5a2b; color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; text-transform: uppercase; transition: 0.3s; margin-bottom: 15px; }
        .btn-calc:hover { background: #a67341; box-shadow: 0 0 15px rgba(139, 90, 43, 0.4); }
        
        .radio-group { margin-bottom: 15px; font-weight: bold; }
        label { cursor: pointer; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>### Registered Attack Report ###</h2>

    <div class="seccion">
        <h3>*BASE FINE*</h3>
        <label>Standard Penalty (Silver):</label>
        <input type="text" value="5,000,000" class="campo-fijo" readonly>
    </div>

    <div class="seccion">
        <h3>*LEADERS STATUS*</h3>
        <p style="font-size: 0.85em; color: #a67341; margin-bottom: 15px;">* Check if dead. Each level adds 3,000 silver.</p>
        
        <div class="lider-fila">
            <input type="checkbox" id="check-h" class="check-oculto" onclick="toggleNivel('check-h', 'n-h')">
            <label for="check-h" class="boton-check"></label>
            <label for="check-h" style="flex-grow:1;">Hero</label>
            <input type="number" id="n-h" class="nivel-input" placeholder="Level" min="1">
        </div>

        <div class="lider-fila">
            <input type="checkbox" id="check-c1" class="check-oculto" onclick="toggleNivel('check-c1', 'n-c1')">
            <label for="check-c1" class="boton-check"></label>
            <label for="check-c1" style="flex-grow:1;">Captain 1</label>
            <input type="number" id="n-c1" class="nivel-input" placeholder="Level" min="1">
        </div>

        <div class="lider-fila">
            <input type="checkbox" id="check-c2" class="check-oculto" onclick="toggleNivel('check-c2', 'n-c2')">
            <label for="check-c2" class="boton-check"></label>
            <label for="check-c2" style="flex-grow:1;">Captain 2</label>
            <input type="number" id="n-c2" class="nivel-input" placeholder="Level" min="1">
        </div>

        <div class="lider-fila">
            <input type="checkbox" id="check-c3" class="check-oculto" onclick="toggleNivel('check-c3', 'n-c3')">
            <label for="check-c3" class="boton-check"></label>
            <label for="check-c3" style="flex-grow:1;">Captain 3</label>
            <input type="number" id="n-c3" class="nivel-input" placeholder="Level" min="1">
        </div>
    </div>

    <div class="seccion">
        <h3>*LOSSES SUSTAINED*</h3>
        <div id="contenedor-tropas"></div>
        <button class="btn-add" onclick="agregarFilaTropa()">+ Add unit type</button>
    </div>

    <div class="seccion">
        <h3>*STOLEN RESOURCES*</h3>
        <div id="contenedor-recursos"></div>
        <button class="btn-add" onclick="agregarFilaRecurso()">+ Add resource</button>
    </div>

    <div class="total-box">
        <div class="radio-group">
            VIEW AS: 
            <input type="radio" name="moneda" value="plata" id="r-plata"> <label for="r-plata">Silver</label>
            <input type="radio" name="moneda" value="oro" id="r-oro" checked style="margin-left: 15px;"> <label for="r-oro">Gold</label>
        </div>
        <button class="btn-calc" onclick="calcular()">Calculate Compensation</button>
        <span id="total-final">0</span>
        <small id="tipo-texto" style="color: #d4af37; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">gold coins</small>
    </div>
</div>

<script>
    // BASE DE DATOS ACTUALIZADA CON IMÁGENES
    const datosTropas = {
        "Guards": { 
            "Mounted": 1265, 
            "Flying": 12640, 
            "Melee/Ranged": 630 
        },
        "Specialists": { 
            "Mounted": 1390, 
            "Flying/Melee/Ranged": 695, 
            "Scouts": 6320 
        },
        "Siege": { 
            "Default Units": 3475 
        },
        "Monsters": { 
            "Tier III": 4000, "Tier IV": 8000, "Tier V": 12000, 
            "Tier VI": 18000, "Tier VII": 24000, "Tier I": 29000, "Tier II": 32000 
        },
        "Temp Mercenaries": { 
            "G-Mounted": 2530, 
            "G-Flying": 25300, 
            "G-Melee/Ranged": 1265,
            "S-Mounted": 2780, 
            "S-Flying": 27800, 
            "S-Melee/Ranged": 1390, 
            "S-Scouts": 6950,
            "Siege": 12650, 
            "Monster: Mounted": 5300, 
            "Monster: Flying": 7585, 
            "Monster: Melee/Ranged": 5000 
        }
    };

    function toggleNivel(checkId, inputId) {
        const input = document.getElementById(inputId);
        input.style.display = document.getElementById(checkId).checked ? "block" : "none";
    }

    function agregarFilaTropa() {
        const container = document.getElementById('contenedor-tropas');
        const div = document.createElement('div');
        div.className = 'fila';
        
        let categorias = Object.keys(datosTropas).map(cat => `<option value="${cat}">${cat}</option>`).join('');
        
        div.innerHTML = `
            <select onchange="actualizarSubtipos(this)">
                <option value="">Category</option>
                ${categorias}
            </select>
            <select class="tropa-tipo" style="display:none;"></select>
            <input type="number" class="cant-tropa" placeholder="Qty" min="0">
            <button class="btn-del" onclick="this.parentElement.remove()">❌</button>
        `;
        container.appendChild(div);
    }

    function actualizarSubtipos(selectCat) {
        const categoria = selectCat.value;
        const selectTipo = selectCat.parentElement.querySelector('.tropa-tipo');
        
        if (categoria && datosTropas[categoria]) {
            let opciones = Object.entries(datosTropas[categoria]).map(([nombre, valor]) => 
                `<option value="${valor}">${nombre} (${valor.toLocaleString()})</option>`
            ).join('');
            selectTipo.innerHTML = opciones;
            selectTipo.style.display = "block";
        } else {
            selectTipo.style.display = "none";
        }
    }

    function agregarFilaRecurso() {
        const container = document.getElementById('contenedor-recursos');
        const div = document.createElement('div');
        div.className = 'fila';
        div.innerHTML = `
            <select class="res-tipo">
                <option value="plata">Silver</option>
                <option value="tar">TAR (x1.5)</option>
                <option value="oro">Gold (x1)</option>
            </select>
            <input type="number" class="res-cant" placeholder="Amount" min="0">
            <button class="btn-del" onclick="this.parentElement.remove()">❌</button>
        `;
        container.appendChild(div);
    }

    function calcular() {
        // 5,000,000 de plata base
        let silverTotal = 5000000;

        // LÍDERES (3,000 plata por nivel de héroe/capitán muerto)
        ['n-h', 'n-c1', 'n-c2', 'n-c3'].forEach(id => {
            let input = document.getElementById(id);
            if (input && input.style.display === "block") {
                silverTotal += (parseInt(input.value) || 0) * 3000;
            }
        });

        // TROPAS
        document.querySelectorAll('#contenedor-tropas .fila').forEach(fila => {
            let cant = parseInt(fila.querySelector('.cant-tropa').value) || 0;
            let valorUnidad = parseInt(fila.querySelector('.tropa-tipo').value) || 0;
            silverTotal += (cant * valorUnidad);
        });

        // RECURSOS
        document.querySelectorAll('#contenedor-recursos .fila').forEach(fila => {
            let cant = parseInt(fila.querySelector('.res-cant').value) || 0;
            let tipo = fila.querySelector('.res-tipo').value;
            
            if (tipo === "plata") silverTotal += cant;
            if (tipo === "tar") silverTotal += (cant * 1.5 * 3000); // 1.5 oro por unidad
            if (tipo === "oro") silverTotal += (cant * 3000);      // 1 oro por unidad
        });

        const modoOro = document.querySelector('input[name="moneda"]:checked').value === "oro";
        const resultLabel = document.getElementById('total-final');
        const typeLabel = document.getElementById('tipo-texto');

        if (modoOro) {
            resultLabel.innerText = Math.round(silverTotal / 3000).toLocaleString();
            typeLabel.innerText = "gold coins";
        } else {
            resultLabel.innerText = Math.round(silverTotal).toLocaleString();
            typeLabel.innerText = "silver";
        }
    }
</script>

</body>
</html>
