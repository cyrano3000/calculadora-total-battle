<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FobS Global Calculator - V15 Export</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 850px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        .lang-selector { text-align: right; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 8px; }
        .fila-dinamica { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px; }
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        .caja-input label { display: block; color: #d4af37; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .btn-calc { background: #8b5a2b; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-share { background: #d4af37; color: #1a110a; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; text-transform: uppercase; }
        .fila-check { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #3d2b1f; margin-bottom: 8px; }
    </style>
</head>
<body onload="cambiarIdioma()">

<div class="contenedor">
    <div class="lang-selector">
        <select id="select-idioma" onchange="cambiarIdioma()">
            <option value="en" selected>English 🇬🇧</option>
            <option value="es">Español 🇪🇸</option>
            <option value="it">Italiano 🇮🇹</option>
            <option value="pt">Português 🇧🇷</option>
        </select>
    </div>

    <h2 id="txt-titulo">Compensation Calculator</h2>

    <h3 id="txt-sec-lideres">1. Captured Leaders</h3>
    <div id="lista-lideres"></div>
    <button class="btn-add" id="btn-add-lider" onclick="nuevoLider()">+ Add Leader</button>

    <h3 id="txt-sec-tropas">2. Unit Losses</h3>
    <div id="lista-tropas"></div>
    <button class="btn-add" id="btn-add-tropa" onclick="nuevaFilaTropa()">+ Add Unit Row</button>

    <h3 id="txt-sec-recursos">3. Stolen Resources</h3>
    <div id="lista-recursos"></div>
    <button class="btn-add" id="btn-add-recurso" onclick="nuevoRecurso()">+ Add Resource</button>

    <h3 id="txt-sec-clan">4. Clan Buildings</h3>
    <div class="fila-check">
        <input type="checkbox" id="check-portal" onchange="calcular()">
        <label id="lbl-portal">Portal Destroyed (+5M Silver)</label>
    </div>
    <div class="grid-triple">
        <div class="caja-input"><label id="lbl-wall">City Walls</label><input type="number" id="wall-lvl" placeholder="Lvl" oninput="calcular()"></div>
        <div class="caja-input"><label id="lbl-fort">Fortress</label><input type="number" id="fort-lvl" placeholder="Lvl" oninput="calcular()"></div>
        <div class="caja-input"><label id="lbl-cap">Capital</label><input type="number" id="cap-lvl" placeholder="Lvl" oninput="calcular()"></div>
    </div>

    <div class="total-box">
        <input type="radio" name="m" value="o" id="m-o" checked onchange="calcular()"> <label for="m-o" id="lbl-gold">Gold</label>
        <span id="total-final">0</span>
        <button class="btn-share" id="btn-share" onclick="compartir()">Generate Summary for Share</button>
    </div>
</div>

<script>
    const i18n = {
        en: { titulo: "Compensation Calculator", secLideres: "1. Captured Leaders", secTropas: "2. Unit Losses", secRecursos: "3. Stolen Resources", secClan: "4. Clan Buildings", btnAddLider: "+ Add Leader", btnAddTropa: "+ Add Unit Row", btnAddRecurso: "+ Add Resource", lblPortal: "Portal Destroyed", lblWall: "City Walls", lblFort: "Fortress", lblCap: "Capital", btnShare: "Generate Summary", shareTitle: "--- COMPENSATION SUMMARY ---", her: "Hero", cap: "Captain", qty: "Qty", total: "Total", units: { "Guards": "Guards", "Specialists": "Specialists", "Mounted": "Mounted" } },
        es: { titulo: "Calculadora de Compensación", secLideres: "1. Líderes Capturados", secTropas: "2. Pérdidas de Tropas", secRecursos: "3. Recursos Robados", secClan: "4. Edificios de Clan", btnAddLider: "+ Añadir Líder", btnAddTropa: "+ Añadir Tropa", btnAddRecurso: "+ Añadir Recurso", lblPortal: "Portal Destruido", lblWall: "Muros Ciudad", lblFort: "Fortaleza", lblCap: "Capital", btnShare: "Generar Resumen", shareTitle: "--- RESUMEN DE COMPENSACIÓN ---", her: "Héroe", cap: "Capitán", qty: "Cant", total: "Total", units: { "Guards": "Guardias", "Specialists": "Especialistas", "Mounted": "Montada" } }
    };

    let idm = 'en';
    const DB_T = { "Guards": { "Mounted": 1265, "Flying": 12640 }, "Specialists": { "Mounted": 1390, "Scouts": 6320 } };

    function cambiarIdioma() {
        idm = document.getElementById('select-idioma').value;
        const t = i18n[idm] || i18n['en'];
        document.getElementById('txt-titulo').innerText = t.titulo;
        document.getElementById('btn-share').innerText = t.btnShare;
        // ... (resto de etiquetas)
    }

    function nuevoLider() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select class="sel-lider"><option value="3000">${i18n[idm].her}</option></select><input type="number" class="lvl-lider" value="1" oninput="calcular()">
        <button onclick="this.parentElement.remove(); calcular();">✖</button>`;
        document.getElementById('lista-lideres').appendChild(div);
    }

    function nuevaFilaTropa() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select onchange="updateSub(this)"><option value="">Cat</option>${Object.keys(DB_T).map(c=>`<option value="${c}">${c}</option>`)}</select>
        <select class="sub-t" onchange="calcular()"></select><input type="number" class="qty" placeholder="Qty" oninput="calcular()">
        <button onclick="this.parentElement.remove(); calcular();">✖</button>`;
        document.getElementById('lista-tropas').appendChild(div);
    }

    function updateSub(sel) {
        const sub = sel.parentElement.querySelector('.sub-t');
        sub.innerHTML = Object.entries(DB_T[sel.value]).map(([n,v])=>`<option value="${v}">${n}</option>`);
        calcular();
    }

    function calcular() {
        let total = 0;
        document.querySelectorAll('.lvl-lider').forEach(i => total += (parseInt(i.value)||0)*3000);
        document.querySelectorAll('.qty').forEach(i => {
            let v = parseInt(i.parentElement.querySelector('.sub-t').value)||0;
            total += (parseInt(i.value)||0)*v;
        });
        document.getElementById('total-final').innerText = Math.round(total/3000).toLocaleString();
    }

    function compartir() {
        let txt = `${i18n[idm].shareTitle}\n\n`;
        document.querySelectorAll('#lista-lideres .fila-dinamica').forEach(f => {
            txt += `• Leader Lvl ${f.querySelector('.lvl-lider').value}\n`;
        });
        document.querySelectorAll('#lista-tropas .fila-dinamica').forEach(f => {
            txt += `• ${f.querySelector('select').value}: ${f.querySelector('.qty').value} units\n`;
        });
        txt += `\nTOTAL: ${document.getElementById('total-final').innerText} GOLD`;
        
        navigator.clipboard.writeText(txt);
        alert("Summary copied to clipboard! Paste it to share.");
    }
</script>
</body>
</html>
