<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K239 Calculator V66 - Multi-Lang & Wall Limit</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 900px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); position: relative; }
        .header-area { display: flex; justify-content: center; align-items: center; border-bottom: 2px solid #8b5a2b; margin-bottom: 15px; padding-bottom: 10px; position: relative; min-height: 50px; }
        h2 { color: #d4af37; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 1.5em; text-align: center; width: 100%; }
        .lang-container { position: absolute; right: 0; top: 0; z-index: 10; }
        .lang-select { background: #8b5a2b; color: white; border: 1px solid #d4af37; padding: 6px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .alerta-multa { background: #4a0f0f; color: #ffcccc; border: 2px solid #ff4d4d; padding: 15px; text-align: center; font-weight: bold; border-radius: 8px; margin-bottom: 20px; text-transform: uppercase; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding: 8px 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); }
        .fila-dinamica { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-report { background: #d4af37; color: #1a110a; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 1.2em; text-transform: uppercase; }
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .del-btn { color:red; background:none; border:none; cursor:pointer; font-weight:bold; font-size: 1.2em; padding: 0 10px; }
    </style>
</head>
<body onload="init()">

<div class="contenedor">
    <div class="header-area">
        <h2 id="txt-titulo">Calculadora K239</h2>
        <div class="lang-container">
            <select id="select-lang" class="lang-select" onchange="changeLang()">
                <option value="es">🇪🇸 ES</option>
                <option value="en">🇺🇸 EN</option>
                <option value="fr">🇫🇷 FR</option>
                <option value="de">🇩🇪 DE</option>
                <option value="ru">🇷🇺 RU</option>
                <option value="ar">🇦🇪 AR</option>
            </select>
        </div>
    </div>
    
    <div class="alerta-multa" id="txt-alerta">⚠️ Multa de Ataque: 5,000,000 Plata (Fija)</div>

    <h3 id="txt-sec1">1. Líderes</h3>
    <div id="lista-lideres"></div>
    <button class="btn-add" onclick="nuevoLider()" id="btn-add-lider">+ Añadir Líder</button>

    <h3 id="txt-sec2">2. Tropas y Monstruos de Cuartel</h3>
    <div id="lista-cuartel"></div>
    <button class="btn-add" onclick="nuevaFila('Cuartel')" id="btn-add-cuartel">+ Añadir Tropa o Monstruo</button>

    <h3 id="txt-sec3">3. Mercenarios Temporales</h3>
    <div id="lista-mercenarios"></div>
    <button class="btn-add" onclick="nuevaFila('Mercenario')" id="btn-add-merc">+ Añadir Mercenario Temporal</button>

    <h3 id="txt-sec-recursos">4. Recursos Varios</h3>
    <div id="lista-recursos"></div>
    <button class="btn-add" onclick="nuevaFila('Recurso')" id="btn-add-rec">+ Añadir Recurso</button>

    <h3 id="txt-sec4">5. Edificios y Otros</h3>
    <div id="lista-fortalezas"></div>
    <button class="btn-add" onclick="nuevaFortaleza()" id="btn-add-fort">+ Añadir Fortaleza (Máx 4)</button>
    
    <div class="grid-triple">
        <div class="caja-input"><label id="txt-wall">Muros (1-8)</label><input type="number" id="wall-lvl" min="0" max="8" oninput="soloPositivos(this, 8)"></div>
        <div class="caja-input"><label id="txt-cap">Capital (1-25)</label><input type="number" id="cap-lvl" min="0" max="25" oninput="soloPositivos(this, 25)"></div>
        <div class="caja-input"><label id="txt-portal">Portal</label><div style="margin-top:5px;"><input type="checkbox" id="check-portal" onchange="calcular()"><span id="txt-destruido"> Destruido</span></div></div>
    </div>

    <div class="total-box">
        <span id="total-final">0</span>
        <div style="margin-top:10px; margin-bottom: 20px;">
            <input type="radio" name="m" id="m-p" onchange="calcular()"> <label for="m-p" id="txt-plata">Plata</label>
            <input type="radio" name="m" id="m-o" checked onchange="calcular()"> <label for="m-o" id="txt-oro">Oro</label>
        </div>
        <button class="btn-report" onclick="generarInforme()" id="btn-report">📋 Copiar Informe Detallado @K239</button>
    </div>
</div>

<script>
    let currentLang = 'es';

    const translations = {
        es: { titulo: "Calculadora K239", alerta: "⚠️ Multa de Ataque: 5,000,000 Plata (Fija)", sec1: "1. Líderes", sec2: "2. Tropas y Monstruos de Cuartel", sec3: "3. Mercenarios Temporales", secRec: "4. Recursos Varios", sec4: "5. Edificios y Otros", addLider: "+ Añadir Líder", addCuartel: "+ Añadir Tropa o Monstruo", addMerc: "+ Añadir Mercenario Temporal", addRec: "+ Añadir Recurso", addFort: "+ Añadir Fortaleza (Máx 4)", wall: "Muros (1-8)", cap: "Capital (1-25)", portal: "Portal", destruido: " Destruido", plata: "Plata", oro: "Oro", report: "📋 Copiar Informe Detallado @K239", hero: "Héroe", captain: "Capitán", fortTxt: "Fortaleza", alertCopy: "✅ Informe detallado copiado.", baseFine: "Multa Base", totalTxt: "TOTAL FINAL", monster: "Monstruo", gold: "Oro", oil: "Aceite (TAR)" },
        en: { titulo: "K239 Calculator", alerta: "⚠️ Attack Fine: 5,000,000 Silver (Fixed)", sec1: "1. Leaders", sec2: "2. Barracks Troops & Monsters", sec3: "3. Temporary Mercenaries", secRec: "4. Various Resources", sec4: "5. Buildings & Others", addLider: "+ Add Leader", addCuartel: "+ Add Troop/Monster", addMerc: "+ Add Temp Mercenary", addRec: "+ Add Resource", addFort: "+ Add Fortress (Max 4)", wall: "Walls (1-8)", cap: "Capital (1-25)", portal: "Portal", destruido: " Destroyed", plata: "Silver", oro: "Gold", report: "📋 Copy Detailed Report @K239", hero: "Hero", captain: "Captain", fortTxt: "Fortress", alertCopy: "✅ Detailed report copied.", baseFine: "Base Fine", totalTxt: "FINAL TOTAL", monster: "Monster", gold: "Gold", oil: "Oil (TAR)" },
        fr: { titulo: "Calculatrice K239", alerta: "⚠️ Amende d'Attaque: 5,000,000 Argent (Fixe)", sec1: "1. Chefs", sec2: "2. Troupes & Monstres de Caserne", sec3: "3. Mercenaires Temporaires", secRec: "4. Ressources Diverses", sec4: "5. Bâtiments & Autres", addLider: "+ Ajouter Chef", addCuartel: "+ Ajouter Troupe/Monstre", addMerc: "+ Ajouter Mercenaire", addRec: "+ Ajouter Ressource", addFort: "+ Ajouter Forteresse", wall: "Murs (1-8)", cap: "Capitale (1-25)", portal: "Portail", destruido: " Détruit", plata: "Argent", oro: "Or", report: "📋 Copier Rapport @K239", hero: "Héros", captain: "Capitaine", fortTxt: "Forteresse", alertCopy: "✅ Rapport copié.", baseFine: "Amende Base", totalTxt: "TOTAL FINAL", monster: "Monstre", gold: "Or", oil: "Huile (TAR)" },
        de: { titulo: "K239 Rechner", alerta: "⚠️ Angriffsstrafe: 5.000.000 Silber (Fest)", sec1: "1. Anführer", sec2: "2. Kasernentruppen & Monster", sec3: "3. Temporäre Söldner", secRec: "4. Verschiedene Ressourcen", sec4: "5. Gebäude & Anderes", addLider: "+ Anführer hinzufügen", addCuartel: "+ Truppe/Monster hinzufügen", addMerc: "+ Söldner hinzufügen", addRec: "+ Ressource hinzufügen", addFort: "+ Festung hinzufügen", wall: "Mauern (1-8)", cap: "Hauptstadt (1-25)", portal: "Portal", destruido: " Zerstört", plata: "Silber", oro: "Gold", report: "📋 Bericht kopieren @K239", hero: "Held", captain: "Hauptmann", fortTxt: "Festung", alertCopy: "✅ Bericht kopiert.", baseFine: "Grundstrafe", totalTxt: "GESAMTSUMME", monster: "Monster", gold: "Gold", oil: "Öl (TAR)" },
        ru: { titulo: "Калькулятор K239", alerta: "⚠️ Штраф: 5,000,000 Серебра", sec1: "1. Лидеры", sec2: "2. Войска и Монстры", sec3: "3. Наемники", secRec: "4. Ресурсы", sec4: "5. Здания", addLider: "+ Добавить Лидера", addCuartel: "+ Добавить Войско/Монстра", addMerc: "+ Добавить Наемника", addRec: "+ Добавить Ресурс", addFort: "+ Добавить Крепость", wall: "Стены (1-8)", cap: "Столица (1-25)", portal: "Портал", destruido: " Разрушен", plata: "Серебро", oro: "Золото", report: "📋 Копировать отчет @K239", hero: "Герой", captain: "Капитан", fortTxt: "Крепость", alertCopy: "✅ Отчет скопирован.", baseFine: "Базовый штраф", totalTxt: "ИТОГО", monster: "Монстр", gold: "Золото", oil: "Нефть (TAR)" },
        ar: { titulo: "حاسبة K239", alerta: "⚠️ غرامة الهجوم: 5,000,000 فضة", sec1: "1. القادة", sec2: "2. القوات والوحوش", sec3: "3. المرتزقة", secRec: "4. موارد متنوعة", sec4: "5. المباني", addLider: "+ إضافة قائد", addCuartel: "+ إضافة قوات/وحش", addMerc: "+ إضافة مرتزقة", addRec: "+ إضافة مورد", addFort: "+ إضافة حصن", wall: "الجدران (1-8)", cap: "العاصمة (1-25)", portal: "البوابة", destruido: " مدمر", plata: "فضة", oro: "ذهب", report: "📋 نسخ التقرير @K239", hero: "بطل", captain: "قائد", fortTxt: "حصن", alertCopy: "✅ تم نسخ التقرير.", baseFine: "الغرامة الأساسية", totalTxt: "المجموع النهائي", monster: "وحش", gold: "ذهب", oil: "نفط (TAR)" }
    };

    const dbPrecios = {
        "Cuartel": [
            { es: "Guardia Montada", en: "Mounted Guard", p: 1250 },
            { es: "Guardia Voladora", en: "Flying Guard", p: 12500 },
            { es: "Guardia C.C. / Distancia", en: "Melee / Ranged Guard", p: 625 },
            { es: "Espec. Montada", en: "Spec. Mounted", p: 1400 },
            { es: "Espec. Volador / C.C. / Distancia", en: "Spec. Flying/Melee/Ranged", p: 700 },
            { es: "Espec. Exploradores", en: "Spec. Scouts", p: 3500 },
            { es: "Tipo Asedio", en: "Siege Type", p: 6250 },
            { es: "Monstruo III", en: "Monster III", p: 4000 },
            { es: "Monstruo IV", en: "Monster IV", p: 8000 },
            { es: "Monstruo V", en: "Monster V", p: 12000 },
            { es: "Monstruo VI", en: "Monster VI", p: 18000 },
            { es: "Monstruo VII", en: "Monster VII", p: 24000 },
            { es: "Monstruo I", en: "Monster I", p: 29000 },
            { es: "Monstruo II", en: "Monster II", p: 32000 }
        ],
        "Mercenario": [
            { es: "Merc. Montada", en: "Merc. Mounted", p: 2500 },
            { es: "Merc. Voladora", en: "Merc. Flying", p: 25000 },
            { es: "Merc. C.C. / Distancia", en: "Merc. Melee / Ranged", p: 1250 }
        ],
        "Recurso": [
            { es: "Oro", en: "Gold", p: 3000 },
            { es: "Aceite (TAR)", en: "Oil (TAR)", p: 4500 }
        ]
    };

    function soloPositivos(input, max = Infinity) {
        let v = parseFloat(input.value);
        if (v < 0 || isNaN(v)) input.value = 0;
        if (v > max) input.value = max;
        calcular();
    }

    function changeLang() {
        currentLang = document.getElementById('select-lang').value;
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('txt-titulo').innerText = t.titulo;
        document.getElementById('txt-alerta').innerText = t.alerta;
        document.getElementById('txt-sec1').innerText = t.sec1;
        document.getElementById('txt-sec2').innerText = t.sec2;
        document.getElementById('txt-sec3').innerText = t.sec3;
        document.getElementById('txt-sec-recursos').innerText = t.secRec;
        document.getElementById('txt-sec4').innerText = t.sec4;
        document.getElementById('btn-add-lider').innerText = t.addLider;
        document.getElementById('btn-add-cuartel').innerText = t.addCuartel;
        document.getElementById('btn-add-merc').innerText = t.addMerc;
        document.getElementById('btn-add-rec').innerText = t.addRec;
        document.getElementById('btn-add-fort').innerText = t.addFort;
        document.getElementById('txt-wall').innerText = t.wall;
        document.getElementById('txt-cap').innerText = t.cap;
        document.getElementById('txt-portal').innerText = t.portal;
        document.getElementById('txt-destruido').innerText = t.destruido;
        document.getElementById('txt-plata').innerText = t.plata;
        document.getElementById('txt-oro').innerText = t.oro;
        document.getElementById('btn-report').innerText = t.report;
        actualizarSelectsLideres();
        
        // Actualizar nombres en combos ya abiertos
        document.querySelectorAll('.t-tipo').forEach(sel => {
            const cat = sel.getAttribute('data-cat');
            const val = sel.value;
            let opts = "";
            dbPrecios[cat].forEach(item => {
                let label = (currentLang === 'es') ? item.es : item.en;
                if(label.includes("Monster") || label.includes("Monstruo")) {
                    label = label.replace("Monster", t.monster).replace("Monstruo", t.monster);
                }
                if(label === "Gold" || label === "Oro") label = t.gold;
                if(label === "Oil (TAR)" || label === "Aceite (TAR)") label = t.oil;
                opts += `<option value="${item.p}" ${item.p == val ? 'selected' : ''}>${label}</option>`;
            });
            sel.innerHTML = opts;
        });
        calcular();
    }

    function actualizarSelectsLideres() {
        const t = translations[currentLang];
        const tieneHeroe = Array.from(document.querySelectorAll('.l-type')).some(s => s.value === 'Héroe');
        document.querySelectorAll('.l-type').forEach(s => {
            const valAnterior = s.value;
            s.innerHTML = '';
            if (valAnterior === 'Héroe' || !tieneHeroe) {
                const optH = document.createElement('option');
                optH.value = 'Héroe'; optH.innerText = t.hero;
                if(valAnterior === 'Héroe') optH.selected = true;
                s.appendChild(optH);
            }
            const optC = document.createElement('option');
            optC.value = 'Capitán'; optC.innerText = t.captain;
            if(valAnterior === 'Capitán') optC.selected = true;
            s.appendChild(optC);
        });
    }

    function nuevoLider() {
        if (document.querySelectorAll('.l-type').length >= 4) return;
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<select class="l-type" onchange="actualizarSelectsLideres(); calcular()"></select>
            <input type="number" class="l-lvl" value="1" min="0" oninput="soloPositivos(this)">
            <button onclick="this.parentElement.remove(); actualizarSelectsLideres(); calcular();" class="del-btn">✖</button>`;
        document.getElementById('lista-lideres').appendChild(div);
        actualizarSelectsLideres();
        calcular();
    }

    function nuevaFila(tipo) {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        let opts = "";
        const t = translations[currentLang];
        dbPrecios[tipo].forEach(item => {
            let label = (currentLang === 'es') ? item.es : item.en;
             if(label.includes("Monster") || label.includes("Monstruo")) {
                label = label.replace("Monster", t.monster).replace("Monstruo", t.monster);
            }
            if(label === "Gold" || label === "Oro") label = t.gold;
            if(label === "Oil (TAR)" || label === "Aceite (TAR)") label = t.oil;
            opts += `<option value="${item.p}">${label}</option>`;
        });
        div.innerHTML = `<select class="t-tipo" data-cat="${tipo}" onchange="calcular()">${opts}</select>
            <input type="number" class="t-qty" placeholder="Cant." min="0" oninput="soloPositivos(this)">
            <button onclick="this.parentElement.remove(); calcular();" class="del-btn">✖</button>`;
        const target = { 'Cuartel': 'lista-cuartel', 'Mercenario': 'lista-mercenarios', 'Recurso': 'lista-recursos' }[tipo];
        document.getElementById(target).appendChild(div);
    }

    function nuevaFortaleza() {
        if (document.querySelectorAll('.fort-lvl').length >= 4) return;
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `<span class="fort-label" style="flex-grow:1">${translations[currentLang].fortTxt}</span><input type="number" class="fort-lvl" value="1" min="0" max="25" oninput="soloPositivos(this, 25)">
            <button onclick="this.parentElement.remove(); calcular();" class="del-btn">✖</button>`;
        document.getElementById('lista-fortalezas').appendChild(div);
    }

    function calcular() {
        let p = 5000000;
        document.querySelectorAll('.l-lvl').forEach(i => p += (parseInt(i.value)||0)*3000);
        document.querySelectorAll('.t-qty').forEach(q => p += (parseFloat(q.value)||0) * parseFloat(q.parentElement.querySelector('.t-tipo').value));
        document.querySelectorAll('.fort-lvl').forEach(i => p += (parseInt(i.value)||0)*50000000);
        p += (parseInt(document.getElementById('wall-lvl').value)||0)*1000000;
        p += (parseInt(document.getElementById('cap-lvl').value)||0)*450000000;
        if(document.getElementById('check-portal').checked) p += 5000000;
        const isO = document.getElementById('m-o').checked;
        document.getElementById('total-final').innerText = Math.round(isO ? p/3000 : p).toLocaleString();
    }

    function generarInforme() {
        const isOro = document.getElementById('m-o').checked;
        const f = isOro ? 3000 : 1;
        const mon = isOro ? translations[currentLang].oro : translations[currentLang].plata;
        const t = translations[currentLang];
        let inf = `📊 **${t.titulo}**\n━━━━━━━━━━━━━━━━━━━━━\n✅ ${t.baseFine}: ${(5000000/f).toLocaleString()} ${mon}\n`;
        
        document.querySelectorAll('#lista-lideres .fila-dinamica').forEach(l => {
            const type = l.querySelector('.l-type').value === 'Héroe' ? t.hero : t.captain;
            const lvl = l.querySelector('.l-lvl').value || 0;
            inf += `👤 ${type} (Lvl ${lvl}): ${((lvl*3000)/f).toLocaleString()} ${mon}\n`;
        });

        document.querySelectorAll('.t-qty').forEach(q => {
            const qty = q.value || 0;
            const sel = q.parentElement.querySelector('.t-tipo');
            const name = sel.options[sel.selectedIndex].text;
            if(qty > 0) inf += `⚔️ ${name} x${parseFloat(qty).toLocaleString()}: ${((qty*parseFloat(sel.value))/f).toLocaleString()} ${mon}\n`;
        });

        document.querySelectorAll('.fort-lvl').forEach((fort, i) => inf += `🛡️ ${t.fortTxt} ${i+1} (Lvl ${fort.value}): ${((fort.value*50000000)/f).toLocaleString()} ${mon}\n`);
        
        const w = document.getElementById('wall-lvl').value || 0;
        if(w > 0) inf += `🧱 ${t.wall.split(' ')[0]} (Lvl ${w}): ${((w*1000000)/f).toLocaleString()} ${mon}\n`;
        
        const c = document.getElementById('cap-lvl').value || 0;
        if(c > 0) inf += `🏰 ${t.cap.split(' (')[0]} (Lvl ${c}): ${((c*450000000)/f).toLocaleString()} ${mon}\n`;
        
        if(document.getElementById('check-portal').checked) inf += `🌀 ${t.portal}${t.destruido}: ${(5000000/f).toLocaleString()} ${mon}\n`;
        
        inf += `━━━━━━━━━━━━━━━━━━━━━\n💰 **${t.totalTxt}: ${document.getElementById('total-final').innerText} ${mon}**\n━━━━━━━━━━━━━━━━━━━━━\n@K239`;
        navigator.clipboard.writeText(inf).then(() => alert(t.alertCopy));
    }

    function init() { updateUI(); }
</script>
</body>
</html>
