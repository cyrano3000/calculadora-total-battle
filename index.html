<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FobS Compensation Calculator - Official V7</title>
    <style>
        body { background: #1a110a; color: #f4e4bc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contenedor { max-width: 850px; margin: auto; background: #2c1e16; border: 2px solid #8b5a2b; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        h2 { color: #d4af37; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        h3 { color: #d4af37; font-size: 1.1em; margin-top: 25px; border-left: 5px solid #8b5a2b; padding-left: 15px; text-transform: uppercase; background: rgba(0,0,0,0.2); padding: 8px; }
        
        .grid-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 10px; margin-bottom: 15px; }
        .caja-input { background: #120c08; padding: 12px; border: 1px solid #3d2b1f; border-radius: 8px; }
        .caja-input label { display: block; color: #d4af37; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        
        input[type="number"], select { background: #1a110a; color: #fff; border: 1px solid #8b5a2b; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        .fila-dinamica { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #3d2b1f; }
        .btn-add { background: #4a7c44; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; margin-bottom: 15px; transition: 0.3s; }
        .btn-add:hover { background: #5da356; }
        
        .fila-check { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #3d2b1f; margin-bottom: 8px; }
        .check-oculto { display: none; }
        .boton-check { width: 24px; height: 24px; border: 2px solid #d4af37; border-radius: 4px; cursor: pointer; background: #1a110a; position: relative; flex-shrink: 0; }
        .check-oculto:checked + .boton-check { background: #4a7c44; border-color: #76b06d; }
        .check-oculto:checked + .boton-check::after { content: '✔'; color: white; position: absolute; left: 4px; top: -2px; font-size: 18px; }
        
        .total-box { margin-top: 30px; padding: 25px; background: #120c08; border: 2px solid #d4af37; text-align: center; border-radius: 12px; }
        #total-final { font-size: 3.5em; color: #d4af37; font-weight: bold; display: block; }
        .btn-calc { background: #8b5a2b; color: white; border: none; padding: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }
        .btn-calc:hover { background: #a67341; }
        small.limit-info { color: #8b5a2b; font-size: 0.75em; display: block; margin-top: 2px; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>### Attack Compensation Calculator ###</h2>

    <h3>1. Captured Leaders</h3>
    <div id="lista-lideres"></div>
    <button class="btn-add" onclick="nuevoLider()">+ Add Captured Leader</button>

    <h3>2. Unit Losses</h3>
    <div id="lista-tropas"></div>
    <button class="btn-add" onclick="nuevaFilaTropa()">+ Add Unit Type</button>

    <h3>3. Stolen Resources</h3>
    <div id="lista-recursos"></div>
    <button class="btn-add" onclick="nuevoRecurso()">+ Add Stolen Resource</button>

    <h3>4. Clan Buildings & Portal</h3>
    <div class="fila-check">
        <input type="checkbox" id="check-portal" class="check-oculto">
        <label for="check-portal" class="boton-check"></label>
        <label for="check-portal" style="flex-grow:1; cursor:pointer; font-weight:bold;">Portal Destroyed (+5,000,000 Silver)</label>
    </div>
    
    <div class="grid-triple">
        <div class="caja-input">
            <label>City Walls Lvl</label>
            <input type="number" id="wall-lvl" placeholder="1-45" min="1" max="45" onchange="validarRango(this, 1, 45)">
            <small class="limit-info">Range: 1-45</small>
        </div>
        <div class="caja-input" style="border: 1px solid #d4af37;">
            <label>Fortress Lvl</label>
            <input type="number" id="fort-lvl" placeholder="1-25" min="1" max="25" onchange="validarRango(this, 1, 25)">
            <small class="limit-info">Range: 1-25</small>
        </div>
        <div class="caja-input" style="border: 1px solid #d4af37;">
            <label>Capital Lvl</label>
            <input type="number" id="cap-lvl" placeholder="1-25" min="1" max="25" onchange="validarRango(this, 1, 25)">
            <small class="limit-info">Range: 1-25</small>
        </div>
    </div>

    <div class="total-box">
        <p>Display as: 
            <input type="radio" name="m" value="p" id="m-p"> <label for="m-p" style="cursor:pointer">Silver</label>
            <input type="radio" name="m" value="o" id="m-o" checked style="margin-left:15px;"> <label for="m-o" style="cursor:pointer">Gold</label>
        </p>
        <button class="btn-calc" onclick="calcular()">Calculate Compensation</button>
        <span id="total-final">0</span>
        <small id="txt-moneda">gold coins</small>
    </div>
</div>

<script>
    const DB_TROPAS = {
        "Guards": { "Mounted": 1265, "Flying": 12640, "Melee/Ranged": 630 },
        "Specialists": { "Mounted": 1390, "Flying/Melee/Ranged": 695, "Scouts": 6320 },
        "Siege": { "Default Units": 3475 },
        "Monsters": { "Tier III": 4000, "Tier IV": 8000, "Tier V": 12000, "Tier VI": 18000, "Tier VII": 24000, "Tier I": 29000, "Tier II": 32000 },
        "Temp Mercs": { 
            "G-Mounted": 2530, "G-Flying": 25300, "G-Melee/Ranged": 1265,
            "S-Mounted": 2780, "S-Flying": 27800, "S-Melee/Ranged": 1390, "S-Scouts": 6950,
            "Siege": 12650, "Monster: Mounted": 5300, "Monster: Flying": 7585, "Monster: Melee/Ranged": 5000 
        }
    };

    // Valores basados en imágenes de recursos
    const VALORES_RECURSOS = {
        "Oro": 3000,
        "Aceite": 4500,
        "Plata": 1,
        "Piedra": 0,
        "Madera": 0,
        "Hierro": 0
    };

    function validarRango(input, min, max) {
        let val = parseInt(input.value);
        if (isNaN(val)) return;
        if (val < min) input.value = min;
        if (val > max) input.value = max;
    }

    function nuevoLider() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        div.innerHTML = `
            <select class="tipo-lider">
                <option value="3000">Hero</option>
                <option value="3000">Captain 1</option>
                <option value="3000">Captain 2</option>
                <option value="3000">Captain 3</option>
            </select>
            <input type="number" class="lvl-lider" placeholder="Level" min="1" value="1" onchange="if(this.value<1)this.value=1">
            <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">✖</button>
        `;
        document.getElementById('lista-lideres').appendChild(div);
    }

    function nuevaFilaTropa() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        let opt = Object.keys(DB_TROPAS).map(c => `<option value="${c}">${c}</option>`).join('');
        div.innerHTML = `<select onchange="updateSubTropa(this)"><option value="">Category</option>${opt}</select>
            <select class="sub-t" style="display:none"></select>
            <input type="number" class="qty" placeholder="Qty" min="1" onchange="if(this.value<1)this.value=1">
            <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">✖</button>`;
        document.getElementById('lista-tropas').appendChild(div);
    }

    function updateSubTropa(sel) {
        const sub = sel.parentElement.querySelector('.sub-t');
        if(sel.value) {
            sub.innerHTML = Object.entries(DB_TROPAS[sel.value]).map(([n,v])=>`<option value="${v}">${n} (${v})</option>`).join('');
            sub.style.display = "block";
        }
    }

    function nuevoRecurso() {
        const div = document.createElement('div');
        div.className = 'fila-dinamica';
        let opt = Object.keys(VALORES_RECURSOS).map(r => `<option value="${VALORES_RECURSOS[r]}">${r}</option>`).join('');
        div.innerHTML = `
            <select class="tipo-recurso">${opt}</select>
            <input type="number" class="qty-recurso" placeholder="Amount" min="1" value="1" onchange="if(this.value<1)this.value=1">
            <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">✖</button>
        `;
        document.getElementById('lista-recursos').appendChild(div);
    }

    function calcular() {
        let plataTotal = 0;
        
        // 1. Líderes
        document.querySelectorAll('#lista-lideres .fila-dinamica').forEach(f => {
            plataTotal += (parseInt(f.querySelector('.lvl-lider').value) || 1) * 3000;
        });

        // 2. Tropas
        document.querySelectorAll('#lista-tropas .fila-dinamica').forEach(f => {
            let qty = parseInt(f.querySelector('.qty').value) || 0;
            let val = parseInt(f.querySelector('.sub-t').value) || 0;
            plataTotal += (qty * val);
        });

        // 3. Recursos (Dinámicos)
        document.querySelectorAll('#lista-recursos .fila-dinamica').forEach(f => {
            let qty = parseInt(f.querySelector('.qty-recurso').value) || 0;
            let factor = parseInt(f.querySelector('.tipo-recurso').value) || 0;
            plataTotal += (qty * factor);
        });
        
        // 4. Edificios de Clan
        if(document.getElementById('check-portal').checked) plataTotal += 5000000;
        
        plataTotal += (parseInt(document.getElementById('wall-lvl').value) || 0) * 1000000;
        plataTotal += (parseInt(document.getElementById('fort-lvl').value) || 0) * 50000000;
        plataTotal += (parseInt(document.getElementById('cap-lvl').value) || 0) * 450000000;

        const isGold = document.getElementById('m-o').checked;
        document.getElementById('total-final').innerText = Math.round(isGold ? plataTotal/3000 : plataTotal).toLocaleString();
        document.getElementById('txt-moneda').innerText = isGold ? "gold coins" : "silver";
    }
</script>
</body>
</html>
